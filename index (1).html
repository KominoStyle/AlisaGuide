var MU = [
  {c:"Lili", deep:true, tag:{en:"Movement war \u2014 she is fairly linear, so disciplined defense beats her.",de:"Movement-Krieg \u2014 sie ist recht linear, disziplinierte Defense schl\u00e4gt sie."},
    hurt:{en:"Her `ws3` (whiff-punish / CH launcher, Tornado), the `db4` snake edge (i30 low), and her Dew Glide (qcf) low-vs-mid mix \u2014 most dangerous in Heat with powered-up Feisty Rabbit. Her backturned (BT) game and Dew Glide chip apply constant pressure.",
      de:"Ihr `ws3` (Whiff-Punish / CH-Launcher, Tornado), der `db4`-Snake-Edge (i30-Low) und ihr Dew-Glide-(qcf)-Low-vs-Mid-Mix \u2014 am gef\u00e4hrlichsten in Heat mit aufgeladenem Feisty Rabbit. Ihr Backturned-(BT)-Game und Dew-Glide-Chip machen konstanten Druck."},
    duck:{en:"**Sidestep LEFT (SSL) by default** \u2014 it steps `df1`, `3`, `uf3` and most of her mids. **SSR only for `df4`, `1+2`, `d1`.** **Duck her high enders:** `ws1,2` (duck the 2), `2,4`, `3,2,3`. Her snake edge and Dew Glide low are slow / reactable \u2014 block on read, don't pre-duck.",
      de:"**Standardm\u00e4\u00dfig Sidestep LINKS (SSL)** \u2014 steppt `df1`, `3`, `uf3` und die meisten Mids. **SSR nur bei `df4`, `1+2`, `d1`.** **Duck ihre High-Ender:** `ws1,2` (die 2 ducken), `2,4`, `3,2,3`. Snake Edge und Dew-Glide-Low sind langsam / reaktionsbar \u2014 auf Read blocken, nicht vorducken."},
    punish:{en:"[[df2]] launches everything **\u221215 or worse**: `ws3` (\u221221), `db4` snake edge (\u221224), `f3+4,3,4` (\u221220), `d3+4` (\u221221), `uf3+4,3+4` (\u221221), `1,1,3` (\u221215), `f2,3` (\u221215). Block the snake edge \u2192 [[df2]] or [[ws2]]. Standing: `DEW.1,2` (\u221214) \u2192 [[f21]]; her \u221213 Heat engagers (`3,1`, `DEW.2,1`) \u2192 [[df1]] / [[c32]].",
      de:"[[df2]] launcht alles **\u221215 oder schlechter**: `ws3` (\u221221), `db4`-Snake-Edge (\u221224), `f3+4,3,4` (\u221220), `d3+4` (\u221221), `uf3+4,3+4` (\u221221), `1,1,3` (\u221215), `f2,3` (\u221215). Snake Edge blocken \u2192 [[df2]] oder [[ws2]]. Stehend: `DEW.1,2` (\u221214) \u2192 [[f21]]; ihre \u221213-Heat-Engager (`3,1`, `DEW.2,1`) \u2192 [[df1]] / [[c32]]."},
    plan:{en:"Kill her movement with homing: [[c32]], [[k4]], [[uf2]], [[b3]]. Whiff-punish her stance whiffs with [[df2]] / [[wr2]] / [[ws2]]. Season 3 nerfed her Feisty Rabbit and Heat pressure (timer cost up, Heat recovery removed, Dew Glide \u22122 on block, Heat Smash now steppable) \u2014 she has **no true unseeable 50/50** outside Heat, so respect nothing you can react to and step her linear pressure.",
      de:"T\u00f6te ihr Movement mit Homing: [[c32]], [[k4]], [[uf2]], [[b3]]. Whiff-punish ihre Stance-Whiffs mit [[df2]] / [[wr2]] / [[ws2]]. Season 3 hat Feisty Rabbit und Heat-Druck generft (Timer-Kosten hoch, Heat-Recovery weg, Dew Glide \u22122 auf Block, Heat Smash jetzt steppbar) \u2014 sie hat **kein echtes unlesbares 50/50** au\u00dferhalb von Heat, also respektier nichts Reaktionsbares und step ihren linearen Druck."}},

  {c:"Dragunov", tag:{en:"Oppressive pressure & plus frames \u2014 SSR is his weak side.",de:"Erdr\u00fcckender Druck & Plus-Frames \u2014 SSR ist seine schwache Seite."},
    hurt:{en:"His `WR2` and `b1+2` (+6) plus-frame threats, the tackle mix, and strong lows. He never wants to give up the turn.",
      de:"Seine `WR2`- und `b1+2`-(+6)-Plus-Frame-Bedrohungen, der Tackle-Mix und starke Lows. Er will den Zug nie abgeben."},
    duck:{en:"**Step SSR** (his weak side). Duck `1,1`, `3,1`, `d3,2`, `b2,1`, `ws1,2` (mix). Bait `WR2` by stepping and whiff-punish it. Break his tackle / mix-grab with the correct throw break.",
      de:"**Step SSR** (schwache Seite). Duck `1,1`, `3,1`, `d3,2`, `b2,1`, `ws1,2` (Mix). Baite `WR2` per Step und whiff-punish. Brich seinen Tackle- / Mix-Grab mit dem richtigen Break."},
    punish:{en:"Launch **\u221215+**: `QCB2` (\u221215~14), `d4,1,3` (\u221216) \u2192 [[df2]]. Standing: `1,2,1` (\u221214), `1+2` (\u221214), `ws1+2` (\u221214) \u2192 [[f21]]; `df2` (\u221212), `f,F+2` (\u221212) \u2192 [[df1]].",
      de:"Launch **\u221215+**: `QCB2` (\u221215~14), `d4,1,3` (\u221216) \u2192 [[df2]]. Stehend: `1,2,1` (\u221214), `1+2` (\u221214), `ws1+2` (\u221214) \u2192 [[f21]]; `df2` (\u221212), `f,F+2` (\u221212) \u2192 [[df1]]."},
    plan:{en:"Don't get pinned \u2014 use [[b3]] / [[uf2]] homing to interrupt his sidestep and your backdash to bait `WR2`. Respect his plus frames (`b1+2` +6): block, don't mash.",
      de:"Lass dich nicht festnageln \u2014 nutz [[b3]] / [[uf2]]-Homing gegen seinen Sidestep und deinen Backdash, um `WR2` zu baiten. Respektier seine Plus-Frames (`b1+2` +6): blocken, nicht mashen."}},

  {c:"Jin", tag:{en:"Electrics, strong mids & Zen stance \u2014 SSR/SWR is his weak side.",de:"Electrics, starke Mids & Zen-Stance \u2014 SSR/SWR ist seine schwache Seite."},
    hurt:{en:"Electric (fast CH launcher), his mid pressure, Zen stance mixups, and Heat with Omen. Strong at every range.",
      de:"Electric (schneller CH-Launcher), Mid-Druck, Zen-Stance-Mixups und Heat mit Omen. Auf jeder Range stark."},
    duck:{en:"**Step SSR/SWR** (`df1` both ways, SSL easier). Duck `1,2,4`, `2,4`, `3,1`, `df1,4`, `b,f+2,1`, `b1,2`. Respect electric \u2014 don't press into it.",
      de:"**Step SSR/SWR** (`df1` beidseitig, SSL leichter). Duck `1,2,4`, `2,4`, `3,1`, `df1,4`, `b,f+2,1`, `b1,2`. Respektier Electric \u2014 nicht reinpressen."},
    punish:{en:"Launch: `1,2,1` (\u221216), `f3` (\u221216), `d3+4` (\u221219), `f,n,d,DF+4,2` (\u221216) \u2192 [[df2]]; WS: `2,1,4~4` (\u221231), `FC.df+4` (\u221226) \u2192 [[ws2]]. Standing: `1+2` (\u221214) \u2192 [[f21]]; `uf4` (\u221213), `d1` (\u221213) \u2192 [[c32]].",
      de:"Launch: `1,2,1` (\u221216), `f3` (\u221216), `d3+4` (\u221219), `f,n,d,DF+4,2` (\u221216) \u2192 [[df2]]; WS: `2,1,4~4` (\u221231), `FC.df+4` (\u221226) \u2192 [[ws2]]. Stehend: `1+2` (\u221214) \u2192 [[f21]]; `uf4` (\u221213), `d1` (\u221213) \u2192 [[c32]]."},
    plan:{en:"Play mid-range and whiff-punish his committal mids with [[df2]]. Homing ([[uf2]], [[b3]]) beats his steps. In Heat, respect Omen stance and electric \u2014 block and take your turn.",
      de:"Spiel Mid-Range und whiff-punish seine committalen Mids mit [[df2]]. Homing ([[uf2]], [[b3]]) schl\u00e4gt seine Steps. In Heat Omen-Stance und Electric respektieren \u2014 blocken und Zug nehmen."}},

  {c:"Kazuya", tag:{en:"Hellsweep & electric mix \u2014 SSL/SWL is his weak side.",de:"Hellsweep- & Electric-Mix \u2014 SSL/SWL ist seine schwache Seite."},
    hurt:{en:"Hellsweep (crouch-dash low) into the mid / electric 50/50, electric CH launcher, and the `ub1+2` laser. Devil form in Heat.",
      de:"Hellsweep (Crouch-Dash-Low) in den Mid/Electric-50/50, Electric-CH-Launcher und der `ub1+2`-Laser. Devil-Form in Heat."},
    duck:{en:"**Step SSL/SWL.** Block the hellsweep **low on reaction** and launch. Duck `df1,2`, `df1,4` (mix), `b2,4`, `3,1`. **His `ub1+2` laser is unblockable in Devil / Heat \u2014 just duck it.**",
      de:"**Step SSL/SWL.** Block den Hellsweep **Low on Reaction** und launch. Duck `df1,2`, `df1,4` (Mix), `b2,4`, `3,1`. **Sein `ub1+2`-Laser ist in Devil / Heat unblockbar \u2014 einfach ducken.**"},
    punish:{en:"Launch the unsafe crouch-dash strings: `f,n,d,df+1` (\u221216), `f,n,d,DF+4,1` (\u221216), `1,2,2` (\u221217), `df3+4,1,2` (\u221219), `db1,2` (\u221219) \u2192 [[df2]]; WS: `uf4,4` (\u221223), `f,n,d,DF+4` (\u221223) \u2192 [[ws2]]. Standing: `1+2` (\u221213), `f3` (\u221213) \u2192 [[c32]].",
      de:"Launch die unsafen Crouch-Dash-Strings: `f,n,d,df+1` (\u221216), `f,n,d,DF+4,1` (\u221216), `1,2,2` (\u221217), `df3+4,1,2` (\u221219), `db1,2` (\u221219) \u2192 [[df2]]; WS: `uf4,4` (\u221223), `f,n,d,DF+4` (\u221223) \u2192 [[ws2]]. Stehend: `1+2` (\u221213), `f3` (\u221213) \u2192 [[c32]]."},
    plan:{en:"[[b1]] high-crushes under his electric and highs while still hitting mid \u2014 a key tool here. Block hellsweep on reaction \u2192 launch. Respect his plus frames after blocked strings, don't mash.",
      de:"[[b1]] high-crusht unter Electric und Highs und trifft trotzdem mid \u2014 ein Schl\u00fcssel-Tool hier. Hellsweep on Reaction blocken \u2192 launchen. Respektier seine Plus-Frames nach geblockten Strings, nicht mashen."}},

  {c:"King", tag:{en:"Throw mixups & big damage \u2014 SSR generally.",de:"Wurf-Mixups & viel Schaden \u2014 generell SSR."},
    hurt:{en:"His throw game (chain / command throws, the JAG unbreakable), `f,F+4`, and big-damage strings. Most dangerous at the wall.",
      de:"Sein Wurf-Game (Chain- / Command-Throws, der JAG-Unbreakable), `f,F+4` und Strings mit viel Schaden. Am gef\u00e4hrlichsten an der Wand."},
    duck:{en:"**Step SSR** (SSL for `db3`, `df3`). On `1,2,1`: **SSR** (the 10-string whiffs too). React to BT `1+2` and the JAG unbreakable throw. **Break his throws:** e.g. Giant Swing breaks with **1** (not 1+2) \u2014 learn the break per grab.",
      de:"**Step SSR** (SSL bei `db3`, `df3`). Bei `1,2,1`: **SSR** (der 10-String whifft auch). Reagier auf BT `1+2` und den JAG-Unbreakable. **Brich seine W\u00fcrfe:** z.B. Giant Swing bricht mit **1** (nicht 1+2) \u2014 Break pro Grab lernen."},
    punish:{en:"Launch: **`d1+2` (\u221224!)**, `f,F+4` (\u221215), `df4,3,4` (\u221215) \u2192 [[df2]]. Standing: `b1,2` (\u221213), `uf4` (\u221213) \u2192 [[c32]]; `f2` (\u221211), `d1,2` (\u221211) \u2192 [[df1]].",
      de:"Launch: **`d1+2` (\u221224!)**, `f,F+4` (\u221215), `df4,3,4` (\u221215) \u2192 [[df2]]. Stehend: `b1,2` (\u221213), `uf4` (\u221213) \u2192 [[c32]]; `f2` (\u221211), `d1,2` (\u221211) \u2192 [[df1]]."},
    plan:{en:"Keep him at mid with [[uf2]] / [[f21]] and don't get pushed to the wall. Break throws (know the break for each), duck obvious command-grab reads and launch with [[ws2]]. In Heat his Jaguar sprint gains armor.",
      de:"Halt ihn mit [[uf2]] / [[f21]] auf Mid und lass dich nicht an die Wand dr\u00e4ngen. Brich W\u00fcrfe (Break pro Wurf kennen), duck offensichtliche Command-Grab-Reads und launch mit [[ws2]]. In Heat bekommt sein Jaguar-Sprint Armor."}},

  {c:"Feng", tag:{en:"Strong mids, power crushes & stance \u2014 step direction varies.",de:"Starke Mids, Power Crushes & Stance \u2014 Step-Richtung variiert."},
    hurt:{en:"His `f,F+1+2` (very hard to step on reaction, especially in Heat), strong mids, Kenpo stance, and a fast (i7) BT power crush.",
      de:"Sein `f,F+1+2` (on Reaction sehr schwer steppbar, besonders in Heat), starke Mids, Kenpo-Stance und ein schneller (i7) BT-Power-Crush."},
    duck:{en:"Step varies: **SSL** for `d2`/`uf3`/`df3`, **SSR** for `uf4`/`df4`/`db1`/`f1+2`. Duck `1,2,2`, `1,3`, `f3,2`, `ws1,3`, `df4,3`. **Power-crush his `f,F+1+2`** instead of trying to step it.",
      de:"Step variiert: **SSL** bei `d2`/`uf3`/`df3`, **SSR** bei `uf4`/`df4`/`db1`/`f1+2`. Duck `1,2,2`, `1,3`, `f3,2`, `ws1,3`, `df4,3`. **Power-crush sein `f,F+1+2`** statt zu steppen."},
    punish:{en:"Launch: `b1+2` (\u221219), `f2,1,2` (\u221219), `df4,2,1+2` (\u221219), `f3,4` (\u221216), `f,F+4` (\u221215) \u2192 [[df2]]; WS: `f4,4` (\u221231), `SS.4` (\u221231), `db4` (\u221226) \u2192 [[ws2]]. Standing: `1,2,2` (\u221214), `f+4,2` (\u221214) \u2192 [[f21]].",
      de:"Launch: `b1+2` (\u221219), `f2,1,2` (\u221219), `df4,2,1+2` (\u221219), `f3,4` (\u221216), `f,F+4` (\u221215) \u2192 [[df2]]; WS: `f4,4` (\u221231), `SS.4` (\u221231), `db4` (\u221226) \u2192 [[ws2]]. Stehend: `1,2,2` (\u221214), `f+4,2` (\u221214) \u2192 [[f21]]."},
    plan:{en:"Use [[pc]] to blow through his `f,F+1+2` and pressure; whiff-punish his stance whiffs with [[df2]]. Homing ([[uf2]], [[b3]]) checks his steps. Watch his i7 BT power crush before you commit.",
      de:"Nutz [[pc]] gegen sein `f,F+1+2` und seinen Druck; whiff-punish Stance-Whiffs mit [[df2]]. Homing ([[uf2]], [[b3]]) checkt seine Steps. Achte auf seinen i7-BT-Power-Crush, bevor du committest."}},
  {c:"Anna", tag:{en:"Poke & pressure like Nina, steps & taunts",de:"Poke & Druck wie Nina, Steps & Taunts"}, hurt:{en:"Launcher `df+2` (,i15~16, -12 — only -12, don't try to launch it). Lows: `d+4`, `d+4,1`, `d+4,1~4`, `df+4`. Heat engagers: `3+4`, `f,F+3,2`, `CJM.2,1`. Plus on block: `ROLL.4` (+7), `HAM.1` (+6), `f,F+4` (+5).",de:"Launcher `df+2` (,i15~16, -12 — nur -12, nicht launchen). Lows: `d+4`, `d+4,1`, `d+4,1~4`, `df+4`. Heat-Engager: `3+4`, `f,F+3,2`, `CJM.2,1`. Plus auf Block: `ROLL.4` (+7), `HAM.1` (+6), `f,F+4` (+5)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,1`, `1,2,1,2`, `1,2,1,4`. Homing (don't step): `b+2`, `1+2`, `f,F+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,1`, `1,2,1,2`, `1,2,1,4`. Homing (nicht steppen): `b+2`, `1+2`, `f,F+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `uf+4` (-18), `3+4` (-16), `uf+1,3` (-16), `qcf+2,1` (-16), `4,2,1+2` (-15). His `df+2` (-12) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `uf+4` (-18), `3+4` (-16), `uf+1,3` (-16), `qcf+2,1` (-16), `4,2,1+2` (-15). Sein `df+2` (-12) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Block her strings and whiff-punish her pokes with [[df2]]; interrupt gaps with [[df1]]. Don't duck-mash into her mids — use your range to control the pace.",de:"Ihre Strings blocken und ihre Pokes mit [[df2]] whiff-punishen; Lücken mit [[df1]] unterbrechen. Nicht in ihre Mids duck-mashen — mit deiner Reichweite das Tempo kontrollieren."}},
  {c:"Armor King", tag:{en:"Grappler — command throws & strong CH",de:"Grappler — Command-Throws & starker CH"}, hurt:{en:"Launcher `df+2` (i15~16, -12 — only -12, don't try to launch it). Lows: `d+4`, `d+3`, `d+3+4`, `d+3+4,1`. Heat engagers: `ws3,1`, `f,F+4`, `f+2,1`. Plus on block: `f,f,F+3+4` (+17g), `f,f,F+3` (+6), `ub+1` (+5).",de:"Launcher `df+2` (i15~16, -12 — nur -12, nicht launchen). Lows: `d+4`, `d+3`, `d+3+4`, `d+3+4,1`. Heat-Engager: `ws3,1`, `f,F+4`, `f+2,1`. Plus auf Block: `f,f,F+3+4` (+17g), `f,f,F+3` (+6), `ub+1` (+5)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,1`, `4,3`, `df+1,2`. Homing (don't step): `f,F+3`, `b+3+4`, `db+3`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,1`, `4,3`, `df+1,2`. Homing (nicht steppen): `f,F+3`, `b+3+4`, `db+3`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `FUFT.b+3+4` (-25), `f+1+4` (-19), `3+4,2` (-18d), `FC.4` (-15). His `df+2` (-12) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `FUFT.b+3+4` (-25), `f+1+4` (-19), `3+4,2` (-18d), `FC.4` (-15). Sein `df+2` (-12) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Break throws on reaction and stay calm on knockdown. Keep him out with [[df1]]/ws2, whiff-punish his lunges with [[df2]], and don't mash into his counter-hits.",de:"Throws auf Reaktion breaken und bei Knockdown ruhig bleiben. Mit [[df1]]/ws2 draußen halten, seine Lunges mit [[df2]] whiff-punishen und nicht in seine Counter-Hits mashen."}},
  {c:"Asuka", tag:{en:"Defensive counter-puncher — reversal & sabaki",de:"Defensiver Counter-Puncher — Reversal & Sabaki"}, hurt:{en:"She punishes aggression: a reversal (reverses your mid punches/kicks) and sabaki. Launcher `df+2` (i15, −6, hard to punish). Her low `d+3+4` launches on hit (+30a). `df+3` is a Balcony Break mid. Heat via `db+1,2` / `f,F+2,1`.",de:"Sie bestraft Aggression: ein Reversal (kontert deine Mid-Punches/Kicks) und Sabaki. Launcher `df+2` (i15, −6, schwer bestrafbar). Ihr Low `d+3+4` launcht auf Hit (+30a). `df+3` ist ein Balcony-Break-Mid. Heat über `db+1,2` / `f,F+2,1`."}, duck:{en:"Note: `1,2` is high,mid — you can't fully duck it (the 2 is a mid). Duck her standing `2` and high strings instead. Because she can reverse, avoid predictable single mids; mix in lows and throws. Block `db+3` / `db+4` lows on read.",de:"Achtung: `1,2` ist High,Mid — nicht komplett duckbar (die 2 ist Mid). Lieber ihre Standing-`2` und High-Strings ducken. Da sie reversen kann, keine vorhersehbaren Einzel-Mids; Lows und Würfe mischen. `db+3` / `db+4`-Lows auf Read blocken."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `uf+4` (−13), `SS.2` (−13), `d+1+2` (−18), `f+2` (−18). Her `df+2` (−6) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `uf+4` (−13), `SS.2` (−13), `d+1+2` (−18), `f+2` (−18). Ihr `df+2` (−6) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Don't be predictable — she thrives on reversing telegraphed offense. Stagger your pressure, mix lows and throws, and whiff-punish her defensive pokes with [[df2]]. Use [[pc]] sparingly (it's reversible). Control the pace; she wants you impatient.",de:"Sei nicht vorhersehbar — sie lebt vom Reversen telegrafierter Offense. Deinen Druck staffeln, Lows und Würfe mischen, ihre defensiven Pokes mit [[df2]] whiff-punishen. [[pc]] sparsam (reversbar). Tempo kontrollieren; sie will dich ungeduldig."}},
  {c:"Azucena", tag:{en:"Libertador stance, evasive rushdown",de:"Libertador-Stance, evasiver Rushdown"}, hurt:{en:"Launcher `df+2` (i15~16, -13). Lows: `d+3`, `d+3,3`, `d+3,3,4`, `d+4`. Heat engagers: `3,3`, `f+4,4`, `b+3`. Plus on block: `d+1` (+4), `uf+3+4` (+4~+6), `ws3` (+4).",de:"Launcher `df+2` (i15~16, -13). Lows: `d+3`, `d+3,3`, `d+3,3,4`, `d+4`. Heat-Engager: `3,3`, `f+4,4`, `b+3`. Plus auf Block: `d+1` (+4), `uf+3+4` (+4~+6), `ws3` (+4)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `2,1,2`, `ws4,1`, `ws4,1,3`. Homing (don't step): `f+4`, `b+2`, `LIB.3+4`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `2,1,2`, `ws4,1`, `ws4,1,3`. Homing (nicht steppen): `f+4`, `b+2`, `LIB.3+4`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `db+1+2` (-21), `3,2~F` (-18), `db+3+4` (-16~-12), `uf+3` (-16a). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `db+1+2` (-21), `3,2~F` (-18), `db+3+4` (-16~-12), `uf+3` (-16a). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Respect the LIB mixup but punish its unsafe options; block, hold guard, and launch her whiffs with [[df2]]. Interrupt her flow with [[df1]] so she can't snowball.",de:"Den LIB-Mixup respektieren, aber seine unsicheren Optionen bestrafen; blocken, Guard halten und ihre Whiffs mit [[df2]] launchen. Ihren Flow mit [[df1]] unterbrechen, damit sie nicht snowballt."}},
  {c:"Bryan", tag:{en:"Keepout, counter-hit launchers & snake edge",de:"Keepout, Counter-Hit-Launcher & Snake Edge"}, hurt:{en:"Fast mid `df+2` (i13). A CH machine — respect his frames. Snake edge `df+3` (i29, low) launches on hit but is slow and reactable. Hatchet `uf+4` (Spike) and homing `df+4` close space. Taunt sets up big damage.",de:"Schneller Mid `df+2` (i13). CH-Maschine — seine Frames respektieren. Snake Edge `df+3` (i29, Low) launcht auf Hit, ist aber langsam und reaktionsbar. Hatchet `uf+4` (Spike) und Homing `df+4` schließen Distanz. Taunt richtet großen Schaden an."}, duck:{en:"Duck `1,2` (high,high). Block the snake edge `df+3` on reaction → free launch. Bryan is linear — sidestep his mids and whiff-punish; but his `f,F+3` (+8) leaves him plus, so don't step into that one.",de:"`1,2` ducken (High,High). Snake Edge `df+3` auf Reaktion blocken → freier Launch. Bryan ist linear — seine Mids sidesteppen und whiff-punishen; aber sein `f,F+3` (+8) lässt ihn plus, also da nicht reinsteppen."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `df+3` snake edge (−26!), `qcb+3` (−13), his whiffed hatchet. Punish −10 with jabs, −13 with [[c32]]. His `ws2` is a mid-throw — ducking cancels it.",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `df+3` Snake Edge (−26!), `qcb+3` (−13), sein gewhiffter Hatchet. −10 mit Jabs, −13 mit [[c32]]. Sein `ws2` ist ein Mid-Throw — Ducken bricht ihn."}, plan:{en:"Bryan wins the CH war up close — don't trade, poke and disengage. Use [[df1]] and ws2 to stay out, [[pc]] through his slow keepout, and launch whiffed df+4/uf+4 with [[df2]]. Block low on his snake-edge reads.",de:"Bryan gewinnt den CH-Krieg im Nahkampf — nicht traden, poken und rausgehen. [[df1]] und ws2 zum Draußenbleiben, [[pc]] durch sein langsames Keepout, gewhiffte df+4/uf+4 mit [[df2]] launchen. Auf Snake-Edge-Reads tief blocken."}},
  {c:"Claudio", tag:{en:"Starburst power, strong mids & homing",de:"Starburst-Power, starke Mids & Homing"}, hurt:{en:"Launcher `df+2` (i14, -13). Lows: `d+4`, `db+4`, `db+4,3`, `d+3`. Heat engagers: `2,1,2`, `f,f,F+2`, `3,2`. Plus on block: `STB.f,F+3,2*` (+12), `STB.f,f,F+1+2` (+8g~+11g), `STB.d+1,2` (+6).",de:"Launcher `df+2` (i14, -13). Lows: `d+4`, `db+4`, `db+4,3`, `d+3`. Heat-Engager: `2,1,2`, `f,f,F+2`, `3,2`. Plus auf Block: `STB.f,F+3,2*` (+12), `STB.f,f,F+1+2` (+8g~+11g), `STB.d+1,2` (+6)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `4,3`, `ws1,1`, `3,2`. Homing (don't step): `4,3`, `b+4,3`, `f+3`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `4,3`, `ws1,1`, `3,2`. Homing (nicht steppen): `4,3`, `b+4,3`, `f+3`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `f+2,2` (-26), `f+2,1,1+2` (-18), `f+1+2` (-18), `d+1+2` (-18), `f,F+2` (-18). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `f+2,2` (-26), `f+2,1,1+2` (-18), `f+1+2` (-18), `d+1+2` (-18), `f,F+2` (-18). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Solid mids and pokes beat him; punish his unsafe launchers with [[uf4]]/[[df2]]. Respect the Starburst-buffed hopkick and whiff-punish his committal moves.",de:"Solide Mids und Pokes schlagen ihn; seine unsicheren Launcher mit [[uf4]]/[[df2]] bestrafen. Den Starburst-Hopkick respektieren und seine committalen Moves whiff-punishen."}},
  {c:"Clive", tag:{en:"Sword guest — big damage, committal swings",de:"Sword-Gast — großer Schaden, committale Swings"}, hurt:{en:"Launcher `df+2` (i15~16 i26~27, -13). Lows: `d+4`, `d+3`, `d+1`, `db+4`. Heat engagers: `1+2`, `f+2,2,2`, `f+1+2`. Plus on block: `PHX.3+4` (+7), `b+3,P,2` (+3), `f,F+1+2` (+3).",de:"Launcher `df+2` (i15~16 i26~27, -13). Lows: `d+4`, `d+3`, `d+1`, `db+4`. Heat-Engager: `1+2`, `f+2,2,2`, `f+1+2`. Plus auf Block: `PHX.3+4` (+7), `b+3,P,2` (+3), `f,F+1+2` (+3)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,1`, `1,f+2`, `2,1`, `4,4`. Homing (don't step): `db+1`, `db+1,1`, `b+1`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,1`, `1,f+2`, `2,1`, `4,4`. Homing (nicht steppen): `db+1`, `db+1,1`, `b+1`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `3,3` (-18~-16), `df+1,4,3` (-18~-16), `uf+2` (-17), `df+1,2` (-16), `1+4` (-15). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `3,3` (-18~-16), `df+1,4,3` (-18~-16), `uf+2` (-17), `df+1,2` (-16), `1+4` (-15). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"His sword moves hit hard but are slow and committal — whiff-punish hard with [[df2]] and block the gaps. Stay patient, don't trade, and punish his unsafe Eikon moves.",de:"Seine Sword-Moves treffen hart, sind aber langsam und committal — hart mit [[df2]] whiff-punishen und die Lücken blocken. Geduldig bleiben, nicht traden, seine unsicheren Eikon-Moves bestrafen."}},
  {c:"Devil Jin", tag:{en:"Mishima mixups, laser keepout & MCR pressure",de:"Mishima-Mixups, Laser-Keepout & MCR-Druck"}, hurt:{en:"Hellsweep `f,n,d,DF+4` mixes with Wind God Fist — classic Mishima 50/50. Launcher `ws2` (i14, Tornado). The laser controls space. `uf+4` is a heat engager. MCR stance (`uf+1` +11) gives strong plus pressure.",de:"Hellsweep `f,n,d,DF+4` mixt mit Wind God Fist — klassisches Mishima-50/50. Launcher `ws2` (i14, Tornado). Der Laser kontrolliert Raum. `uf+4` ist Heat-Engager. MCR-Stance (`uf+1` +11) gibt starken Plus-Druck."}, duck:{en:"Duck `1,2` (high,high). His homing `4` / `uf+2` beat steps. Block the hellsweep low on read → launch; block WGF (mid) standing. Don't challenge MCR pressure (`uf+1` +11) — block and take your turn back after.",de:"`1,2` ducken (High,High). Homing `4` / `uf+2` schlagen Steps. Hellsweep-Low auf Read blocken → Launch; WGF (Mid) stehend blocken. MCR-Druck (`uf+1` +11) nicht challengen — blocken und danach den Zug zurückholen."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: hellsweep `f,n,d,DF+4` (−23), `b+3` (−18~−15), `db+3` (−17), `b+2,3` (−14). His `ws2` is −12 → [[c32]]. Punish −10 with jabs.",de:"Auf Block launchbar → [[uf4]]/[[df2]]: Hellsweep `f,n,d,DF+4` (−23), `b+3` (−18~−15), `db+3` (−17), `b+2,3` (−14). Sein `ws2` ist −12 → [[c32]]. −10 mit Jabs."}, plan:{en:"Beat the Mishima game with fundamentals: block hellsweep on read and launch, block WGF standing, punish everything unsafe with [[df2]]. Stay at range so his mixups cost him a dash; use ws2 fishing and [[pc]] against MCR pressure.",de:"Das Mishima-Spiel mit Fundamentals schlagen: Hellsweep auf Read blocken und launchen, WGF stehend blocken, alles Unsichere mit [[df2]] bestrafen. Auf Distanz bleiben, damit seine Mixups einen Dash kosten; ws2-Fishing und [[pc]] gegen MCR-Druck."}},
  {c:"Eddy", tag:{en:"Capoeira flow — handstand, tricky lows/highs",de:"Capoeira-Flow — Handstand, fiese Lows/Highs"}, hurt:{en:"Launcher `df+2` (i14~15, -5 — only -5, don't try to launch it). Lows: `d+4`, `d+4,3`, `df+4`, `db+2`. Heat engagers: `4,4`, `uf+1,4`, `f+3+4`. Plus on block: `1,2,4~4` (+8~+10), `u+4~4` (+8), `f,f,F+3` (+8).",de:"Launcher `df+2` (i14~15, -5 — nur -5, nicht launchen). Lows: `d+4`, `d+4,3`, `df+4`, `db+2`. Heat-Engager: `4,4`, `uf+1,4`, `f+3+4`. Plus auf Block: `1,2,4~4` (+8~+10), `u+4~4` (+8), `f,f,F+3` (+8)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,3`, `1,2,4`, `1,2,4~3`. Homing (don't step): `f+3`, `qcb+4`, `uf+4`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,3`, `1,2,4`, `1,2,4~3`. Homing (nicht steppen): `f+3`, `qcb+4`, `uf+4`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `f+4,3+4` (-24c), `b+1,4,3+4` (-24c), `df+3` (-18~-16), `uf+3,3` (-18), `ws2` (-18). His `df+2` (-5) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `f+4,3+4` (-24c), `b+1,4,3+4` (-24c), `df+3` (-18~-16), `uf+3,3` (-18), `ws2` (-18). Sein `df+2` (-5) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Hold guard through his flow — most of it is steppable or minus. Block his lows, punish stance whiffs with [[df2]], interrupt with [[df1]]. Don't panic-mash into his rhythm.",de:"Den Guard durch seinen Flow halten — das meiste ist steppbar oder minus. Seine Lows blocken, Stance-Whiffs mit [[df2]] bestrafen, mit [[df1]] unterbrechen. Nicht panisch in seinen Rhythmus mashen."}},
  {c:"Fahkumram", tag:{en:"Muay Thai — long range & big damage",de:"Muay Thai — große Reichweite & Schaden"}, hurt:{en:"Launcher `df+2` (i15, -7 — only -7, don't try to launch it). Lows: `d+4`, `d+3`, `d+3,4`, `d+3,4,3`. Heat engagers: `ws1,2`, `uf+3`, `df+1,4`. Plus on block: `...GRF.3*` (+13 RAM), `...GRF.4*` (+13 RAM), `1,2,4,3~4*` (+9).",de:"Launcher `df+2` (i15, -7 — nur -7, nicht launchen). Lows: `d+4`, `d+3`, `d+3,4`, `d+3,4,3`. Heat-Engager: `ws1,2`, `uf+3`, `df+1,4`. Plus auf Block: `...GRF.3*` (+13 RAM), `...GRF.4*` (+13 RAM), `1,2,4,3~4*` (+9)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,1`, `1,2,1,4`, `1,2,4`. Homing (don't step): `1,2,4,3~4*~B`, `4,3~4*~B`, `3,4~3*~B`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,1`, `1,2,1,4`, `1,2,4`. Homing (nicht steppen): `1,2,4,3~4*~B`, `4,3~4*~B`, `3,4~3*~B`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `uf+4` (-16), `1,2,4,4` (-15), `3,1,d+4` (-15), `4,4` (-15), `b+2` (-15). His `df+2` (-7) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `uf+4` (-16), `1,2,4,4` (-15), `3,1,d+4` (-15), `4,4` (-15), `b+2` (-15). Sein `df+2` (-7) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Get inside his range where his long limbs whiff, then poke and punish. Whiff-punish his committal mids with [[df2]] and respect his power crushes. Don't play his long-range game.",de:"In seine Reichweite kommen, wo seine langen Limbs whiffen, dann poken und bestrafen. Committale Mids mit [[df2]] whiff-punishen und seine Power Crushes respektieren. Nicht sein Long-Range-Spiel spielen."}},
  {c:"Heihachi", tag:{en:"Mishima — hellsweep, WGF & electrics",de:"Mishima — Hellsweep, WGF & Electrics"}, hurt:{en:"Launcher `df+2` (i13~14, -7 — only -7, don't try to launch it). Lows: `db+3`, `f,n,d,DF+4`, `f,n,d,DF+4,4`, `f,n,d,DF+4,4,4`. Heat engagers: `f,F+1+2`, `qcf+2`, `uf+2,1`. Plus on block: `f,n,d,df+3` (+11g), `RAI.2` (+10), `f,n,d,DF+4,4,4,3` (+9).",de:"Launcher `df+2` (i13~14, -7 — nur -7, nicht launchen). Lows: `db+3`, `f,n,d,DF+4`, `f,n,d,DF+4,4`, `f,n,d,DF+4,4,4`. Heat-Engager: `f,F+1+2`, `qcf+2`, `uf+2,1`. Plus auf Block: `f,n,d,df+3` (+11g), `RAI.2` (+10), `f,n,d,DF+4,4,4,3` (+9)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,1`, `1,1,2`, `1,2`, `1,2,2`. Homing (don't step): `b+3`, `uf+4`, `RAI.2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,1`, `1,1,2`, `1,2`, `1,2,2`. Homing (nicht steppen): `b+3`, `uf+4`, `RAI.2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `1,1,2` (-17), `df+2,1` (-17), `qcf+2` (-17), `f,F+2` (-16), `1,b+2,1` (-15). His `df+2` (-7) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `1,1,2` (-17), `df+2,1` (-17), `qcf+2` (-17), `f,F+2` (-16), `1,b+2,1` (-15). Sein `df+2` (-7) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Fundamentals beat the Mishima: block hellsweep on read and launch, block WGF standing, punish everything unsafe with [[df2]]. Stay at range so his mixups cost him a dash.",de:"Fundamentals schlagen den Mishima: Hellsweep auf Read blocken und launchen, WGF stehend blocken, alles Unsichere mit [[df2]] bestrafen. Auf Distanz bleiben, damit seine Mixups einen Dash kosten."}},
  {c:"Hwoarang", tag:{en:"Relentless stance pressure (LFS/RFF/RFS)",de:"Dauerhafter Stance-Druck (LFS/RFF/RFS)"}, hurt:{en:"Nonstop stance pressure from flamingo (LFS), Right Flamingo (RFF) and switches. Tons of plus frames: `RFF.f+3` (+12), `3,3,4` (+8), plus-low `d+3,4` (+8). Launcher `df+2` (−7, safe). Fast homing mid `df+4`.",de:"Dauerhafter Stance-Druck aus Flamingo (LFS), Right Flamingo (RFF) und Wechseln. Viele Plus-Frames: `RFF.f+3` (+12), `3,3,4` (+8), Plus-Low `d+3,4` (+8). Launcher `df+2` (−7, safe). Schneller Homing-Mid `df+4`."}, duck:{en:"Duck `1,2` (high,high). Stepping is risky — his stances track and `df+4` / `d+3+4` are homing; block and find the gaps instead. Block his lows (`db+4`, `LFS.d+3`) — but low enders like `db+4,4` are plus, so don't mash after.",de:"`1,2` ducken (High,High). Steppen ist riskant — seine Stances tracken und `df+4` / `d+3+4` sind Homing; lieber blocken und Lücken finden. Seine Lows blocken (`db+4`, `LFS.d+3`) — aber Low-Ender wie `db+4,4` sind plus, also danach nicht mashen."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `df+3` (−14), `df+3+4` (−14). Most stance strings are safe or plus — don't force punishes, wait for the unsafe ender. His `uf+4` is a high (−2) — duck-punish it. Cover −10 with jabs.",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `df+3` (−14), `df+3+4` (−14). Die meisten Stance-Strings sind safe oder plus — keine Punishes erzwingen, auf den unsicheren Ender warten. Sein `uf+4` ist ein High (−2) — wegducken und bestrafen. −10 mit Jabs."}, plan:{en:"Patience beats Hwoarang: block, hold guard through the plus frames, and take your turn only in real gaps with fast jabs or [[pc]]. Don't panic-step. When he whiffs a stance transition, launch with [[df2]]. Keep him at range to deny stance entry.",de:"Geduld schlägt Hwoarang: blocken, den Guard durch die Plus-Frames halten und nur in echten Lücken mit schnellen Jabs oder [[pc]] den Zug nehmen. Nicht panisch steppen. Wenn er einen Stance-Transition whifft, mit [[df2]] launchen. Auf Distanz halten, um Stance-Einstieg zu verhindern."}},
  {c:"Jack 8", tag:{en:"Big body — armor, long range, gigaton",de:"Großer Körper — Armor, Reichweite, Gigaton"}, hurt:{en:"Launcher `df+2` (i15, -14). Lows: `db+1`, `db+1,1`, `db+1,1,1`, `db+1,1,1,2`. Heat engagers: `b+1+2`, `b+2`, `b+2*`. Plus on block: `1+4,1` (+21g), `HCF,1` (+21g), `FUFT.d+1+2` (+18g).",de:"Launcher `df+2` (i15, -14). Lows: `db+1`, `db+1,1`, `db+1,1,1`, `db+1,1,1,2`. Heat-Engager: `b+1+2`, `b+2`, `b+2*`. Plus auf Block: `1+4,1` (+21g), `HCF,1` (+21g), `FUFT.d+1+2` (+18g)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `2,1,1+2`, `1,2`, `f+1,1`, `f+1,2`. Homing (don't step): `1+2`, `f,F+1+2`, `ub+1+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `2,1,1+2`, `1,2`, `f+1,1`, `f+1,2`. Homing (nicht steppen): `1+2`, `f,F+1+2`, `ub+1+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `f,F+1+4` (-82~-73), `df+2,1*` (-46), `df+2,1` (-32), `df+3+4` (-23), `ws1+2,1+2,1+2` (-23). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `f,F+1+4` (-82~-73), `df+2,1*` (-46), `df+2,1` (-32), `df+3+4` (-23), `ws1+2,1+2,1+2` (-23). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Stay mobile and whiff-punish his slow limbs with [[df2]]; don't get caught in armor moves — sidestep or block and punish. Keep pressure so he can't wind up his big hits.",de:"Mobil bleiben und seine langsamen Limbs mit [[df2]] whiff-punishen; nicht in Armor-Moves laufen — sidesteppen oder blocken und bestrafen. Druck halten, damit er seine großen Hits nicht auflädt."}},
  {c:"Jun", tag:{en:"Nature style — parries, evasive, strong CH",de:"Nature-Style — Parries, evasiv, starker CH"}, hurt:{en:"Launcher `df+2` (i16~17, -12 — only -12, don't try to launch it). Lows: `d+3+4`, `d+4`, `d+4,4`, `db+3`. Heat engagers: `1+2`, `f+2,1+2`, `IZU.3`. Plus on block: `f,F+1+2` (+6), `SS.4` (+6), `1,2,2` (+4).",de:"Launcher `df+2` (i16~17, -12 — nur -12, nicht launchen). Lows: `d+3+4`, `d+4`, `d+4,4`, `db+3`. Heat-Engager: `1+2`, `f+2,1+2`, `IZU.3`. Plus auf Block: `f,F+1+2` (+6), `SS.4` (+6), `1,2,2` (+4)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,2`, `1,2,4`, `2,1,4,3`. Homing (don't step): `1,2,2`, `f+3,2`, `df+3`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,2`, `1,2,4`, `2,1,4,3`. Homing (nicht steppen): `1,2,2`, `f+3,2`, `df+3`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `1+4,2,d+4` (-23~-22), `ws3+4` (-21), `uf+4` (-20), `ws1,4,1+2` (-20), `b+3` (-19~-18). His `df+2` (-12) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `1+4,2,d+4` (-23~-22), `ws3+4` (-21), `uf+4` (-20), `ws1,4,1+2` (-20), `b+3` (-19~-18). Sein `df+2` (-12) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Don't be predictable — she can parry. Stagger pressure, mix lows and throws, and whiff-punish her defensive pokes with [[df2]]. Control the pace and punish her unsafe strings.",de:"Sei nicht vorhersehbar — sie kann parieren. Druck staffeln, Lows und Würfe mischen, ihre defensiven Pokes mit [[df2]] whiff-punishen. Tempo kontrollieren und ihre unsicheren Strings bestrafen."}},
  {c:"Kuma", tag:{en:"Bear — hunting stance, grabs, odd hitboxes",de:"Bär — Hunting Stance, Grabs, seltsame Hitboxen"}, hurt:{en:"Launcher `df+2` (i15~16, -9 — only -9, don't try to launch it). Lows: `d+4`, `db+2`, `db+3`, `d+3`. Heat engagers: `1+2`, `qcf+2,1`, `b+1+2`. Plus on block: `FUFT.d+1+2` (+18~+20), `HBS.f,f` (+14~+19), `FC.df+2,1,1+2,3,1+2,3+4,1+2,2,3,1` (+11).",de:"Launcher `df+2` (i15~16, -9 — nur -9, nicht launchen). Lows: `d+4`, `db+2`, `db+3`, `d+3`. Heat-Engager: `1+2`, `qcf+2,1`, `b+1+2`. Plus auf Block: `FUFT.d+1+2` (+18~+20), `HBS.f,f` (+14~+19), `FC.df+2,1,1+2,3,1+2,3+4,1+2,2,3,1` (+11)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `f+2,1`, `b+2,1`, `b+2,1,1+2`. Homing (don't step): `b+1+2`, `ws3`, `uf+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `f+2,1`, `b+2,1`, `b+2,1,1+2`. Homing (nicht steppen): `b+1+2`, `ws3`, `uf+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `b+3+4` (-28), `b+1+4,f,f` (-20~+55), `f,F+2` (-19), `qcf+2,2` (-18), `1,1,1` (-16). His `df+2` (-9) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `b+3+4` (-28), `b+1+4,f,f` (-20~+55), `f,F+2` (-19), `qcf+2,2` (-18), `1,1,1` (-16). Sein `df+2` (-9) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Block and punish — most of his stance stuff is unsafe. Break his command grabs, whiff-punish his lunges with [[df2]], and don't respect Hunting Stance blindly.",de:"Blocken und bestrafen — das meiste Stance-Zeug ist unsicher. Seine Command-Grabs breaken, Lunges mit [[df2]] whiff-punishen und Hunting Stance nicht blind respektieren."}},
  {c:"Kunimitsu", tag:{en:"Ninja — kunai, teleport, evasive",de:"Ninja — Kunai, Teleport, evasiv"}, hurt:{en:"Launcher `df+2` (i15~16, -14). Lows: `d+3`, `d+3,4`, `db+4`, `db+3`. Heat engagers: `ws2,1`, `f+1+2`, `BT.1,4`. Plus on block: `BT.4` (+6), `b+1,1` (+5), `b+1,1,1` (+5).",de:"Launcher `df+2` (i15~16, -14). Lows: `d+3`, `d+3,4`, `db+4`, `db+3`. Heat-Engager: `ws2,1`, `f+1+2`, `BT.1,4`. Plus auf Block: `BT.4` (+6), `b+1,1` (+5), `b+1,1,1` (+5)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `f,F+4,2`, `1,2`, `1,2,2`, `1,2,4`. Homing (don't step): `3`, `BT.4`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `f,F+4,2`, `1,2`, `1,2,2`, `1,2,4`. Homing (nicht steppen): `3`, `BT.4`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `b+1,1,1,1,1,1` (-72), `uf,n,3` (-29), `b+3,4` (-20), `f,F+4` (-17~-15), `f,F+4,2` (-17~-16). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `b+1,1,1,1,1,1` (-72), `uf,n,3` (-29), `b+3,4` (-20), `f,F+4` (-17~-15), `f,F+4,2` (-17~-16). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Don't whiff — she punishes from evasion. Block her lows, punish unsafe teleport/whip moves with [[uf4]]/[[df2]], and keep steady pokes with [[df1]].",de:"Nicht whiffen — sie bestraft aus der Evasion. Ihre Lows blocken, unsichere Teleport-/Whip-Moves mit [[uf4]]/[[df2]] bestrafen und mit [[df1]] stetig poken."}},
  {c:"Lars", tag:{en:"Aggressive rushdown, stance transitions & plus frames",de:"Aggressiver Rushdown, Stance-Transitions & Plus-Frames"}, hurt:{en:"Fast, safe mids `df+2` (i14, −3, CH launch) and `df+1` (i13). Strong plus pressure — `f,f,F+3` (+6) and dash-ins. Launcher `uf+4` (i25, slow). Stance mix from Dynamic Entry (DEN) and Silent Entry (SEN); heat via `3+4` / `1,1,1`.",de:"Schnelle, safe Mids `df+2` (i14, −3, CH-Launch) und `df+1` (i13). Starker Plus-Druck — `f,f,F+3` (+6) und Dash-Ins. Launcher `uf+4` (i25, langsam). Stance-Mix aus Dynamic Entry (DEN) und Silent Entry (SEN); Heat über `3+4` / `1,1,1`."}, duck:{en:"Duck `1,2` (high,high). His homing `b+1` / `b+1+2` beat steps. Block his lows — `d+3` (i15, −14), `db+1` (−12); his `f,F+3+4` low is −16 → launch. Respect his plus frames — don't mash after his dash pressure.",de:"`1,2` ducken (High,High). Homing `b+1` / `b+1+2` schlagen Steps. Seine Lows blocken — `d+3` (i15, −14), `db+1` (−12); sein `f,F+3+4`-Low ist −16 → Launch. Plus-Frames respektieren — nach Dash-Druck nicht mashen."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `f,F+3+4` (−16), `1,1,1` (−12). His `df+2` is only −3 → don't try. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `f,F+3+4` (−16), `1,1,1` (−12). Sein `df+2` ist nur −3 → lass es. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Lars overwhelms with dash-in plus pressure — hold guard and only challenge real gaps with [[df1]] or [[pc]]. Launch his whiffed `uf+4` and slow lows with [[df2]]. Keep him at range with ws2 fishing so his stance entries whiff.",de:"Lars überrennt mit Dash-In-Plus-Druck — Guard halten und nur echte Lücken mit [[df1]] oder [[pc]] challengen. Sein gewhifftes `uf+4` und langsame Lows mit [[df2]] launchen. Mit ws2-Fishing auf Distanz halten, damit seine Stance-Einstiege whiffen."}},
  {c:"Law", tag:{en:"Fast rushdown, DSS stance & safe launcher",de:"Schneller Rushdown, DSS-Stance & safe Launcher"}, hurt:{en:"His launcher `df+2` is only −7 (safe) — you can't launch it. `ws3` is +16 on block (huge plus from crouch). Fast `df+4` (i13). DSS (Dragon Sign) mixups; slow junkyard low `db+4`. Heat via `1,1,1` / `b+1,2,2`.",de:"Sein Launcher `df+2` ist nur −7 (safe) — nicht launchbar. `ws3` ist +16 auf Block (riesig aus dem Crouch). Schneller `df+4` (i13). DSS-Mixups (Dragon Sign); langsamer Junkyard-Low `db+4`. Heat über `1,1,1` / `b+1,2,2`."}, duck:{en:"Duck `1,2` (high,high). Block his lows — `d+3+4` (i12, −15), `d+4` (−11). His `db+4` low is slow → block on read and launch. After `ws3` (+16) it's his turn — don't mash.",de:"`1,2` ducken (High,High). Seine Lows blocken — `d+3+4` (i12, −15), `d+4` (−11). Sein `db+4`-Low ist langsam → auf Read blocken und launchen. Nach `ws3` (+16) ist sein Zug — nicht mashen."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `ws2` (−18!), `df+3` (−13), `b+1,2,2` (−14), `uf+4` (−13). His `df+2` at −7 is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `ws2` (−18!), `df+3` (−13), `b+1,2,2` (−14), `uf+4` (−13). Sein `df+2` mit −7 ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Law is all-in rushdown with flashy but unsafe strings — block calmly and launch the −13 to −18 enders with [[df2]]. Don't mash into his DSS mixups; interrupt gaps with [[df1]]. Use your range so he has to commit.",de:"Law ist All-In-Rushdown mit auffälligen, aber unsicheren Strings — ruhig blocken und die −13- bis −18-Ender mit [[df2]] launchen. Nicht in seine DSS-Mixups mashen; Lücken mit [[df1]] unterbrechen. Deine Reichweite nutzen, damit er committen muss."}},
  {c:"Lee", tag:{en:"Fast stylish pokes, Hitman stance & Acid Rain",de:"Schnelle stylishe Pokes, Hitman-Stance & Acid Rain"}, hurt:{en:"Fast pokes and mist steps. Launchers `df+2` (i15, −7 safe) and `uf+4` (i15, −13). Acid Rain — the repeating `D+4` low series chips and mixes. Hitman (HMS) stance strings; heat via `df+3,2,3` / `df+4,4`.",de:"Schnelle Pokes und Mist-Steps. Launcher `df+2` (i15, −7 safe) und `uf+4` (i15, −13). Acid Rain — die wiederholende `D+4`-Low-Serie knabbert und mixt. Hitman-Stance-Strings (HMS); Heat über `df+3,2,3` / `df+4,4`."}, duck:{en:"Duck `1,2` (high,high). Block the Acid Rain low `D+4` (i12) and its follow-ups — they're minus, so block and take your turn. His `db+4` (−15) is launch-punishable. Homing `1+2` beats steps.",de:"`1,2` ducken (High,High). Den Acid-Rain-Low `D+4` (i12) und seine Follow-ups blocken — sie sind minus, also blocken und Zug nehmen. Sein `db+4` (−15) ist launchbar. Homing `1+2` schlägt Steps."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `db+4` (−15), `uf+4` (−13), `df+3,2,3` (−14). Punish `f,F+3` (−9) with [[c32]]. His `df+2` at −7 is safe. Cover −10 with jabs.",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `db+4` (−15), `uf+4` (−13), `df+3,2,3` (−14). `f,F+3` (−9) mit [[c32]] bestrafen. Sein `df+2` mit −7 ist safe. −10 mit Jabs."}, plan:{en:"Don't get lost in his stagger pressure — block the Acid Rain low, hold guard, and punish the unsafe stance enders with [[df2]]. Interrupt with [[df1]] and whiff-punish precisely (his pokes recover fast). Keep him at your range.",de:"Verlier dich nicht in seinem Stagger-Druck — den Acid-Rain-Low blocken, Guard halten und die unsicheren Stance-Ender mit [[df2]] bestrafen. Mit [[df1]] unterbrechen und präzise whiff-punishen (seine Pokes recovern schnell). Auf Distanz halten."}},
  {c:"Leo", tag:{en:"Bajiquan — KNK stance, fast mids & pokes",de:"Bajiquan — KNK-Stance, schnelle Mids & Pokes"}, hurt:{en:"Launcher `df+2` (i15~16, -13~-12). Lows: `d+3+4`, `d+3`, `d+4`, `d+4,2`. Heat engagers: `ws4,1+2`, `b+2,1+2`, `db+2,4`. Plus on block: `3,2,4` (+9~+10), `f+4` (+9~+10), `b+1,4` (+9).",de:"Launcher `df+2` (i15~16, -13~-12). Lows: `d+3+4`, `d+3`, `d+4`, `d+4,2`. Heat-Engager: `ws4,1+2`, `b+2,1+2`, `db+2,4`. Plus auf Block: `3,2,4` (+9~+10), `f+4` (+9~+10), `b+1,4` (+9)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,1`, `1,2,1,1`, `1,2,1,4`. Homing (don't step): `df+3`, `qcf+3+4`, `BOK.3`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,1`, `1,2,1,1`, `1,2,1,4`. Homing (nicht steppen): `df+3`, `qcf+3+4`, `BOK.3`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `b+1+2` (-24~-23), `BT.1+2` (-20), `ub+1,P.4` (-16~-15). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `b+1+2` (-24~-23), `BT.1+2` (-20), `ub+1,P.4` (-16~-15). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Trade pokes and win with range; punish KNK's unsafe options with [[df2]]. Interrupt with [[df1]], block the lows, and whiff-punish committal mids.",de:"Pokes traden und mit Reichweite gewinnen; KNKs unsichere Optionen mit [[df2]] bestrafen. Mit [[df1]] unterbrechen, die Lows blocken und committale Mids whiff-punishen."}},
  {c:"Leroy", tag:{en:"Kung fu — cane, parries & keepout",de:"Kung Fu — Stock, Parries & Keepout"}, hurt:{en:"Launcher `df+2` (i15~16, -6 — only -6, don't try to launch it). Lows: `d+4`, `d+4,4`, `d+2`, `d+2,4`. Heat engagers: `1+2,1+2,1`, `f+4,4`, `d+1+2`. Plus on block: `b+3` (+9~+10), `SS.1+2` (+7), `f,f,F+3` (+6~+9).",de:"Launcher `df+2` (i15~16, -6 — nur -6, nicht launchen). Lows: `d+4`, `d+4,4`, `d+2`, `d+2,4`. Heat-Engager: `1+2,1+2,1`, `f+4,4`, `d+1+2`. Plus auf Block: `b+3` (+9~+10), `SS.1+2` (+7), `f,f,F+3` (+6~+9)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,1,1+2`, `1,1,1+2,1`, `1,2`, `1,2,1`. Homing (don't step): `b+4`, `b+3`, `HRM.b+4`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,1,1+2`, `1,1,1+2,1`, `1,2`, `1,2,1`. Homing (nicht steppen): `b+4`, `b+3`, `HRM.b+4`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `df+2,1+2` (-18), `1+2,1+2,1` (-17~-16), `1,1,1+2,1` (-16~-15), `f+3,1+2,4` (-16~-15), `f,F+2,2` (-15~-14). His `df+2` (-6) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `df+2,1+2` (-18), `1+2,1+2,1` (-17~-16), `1,1,1+2,1` (-16~-15), `f+3,1+2,4` (-16~-15), `f,F+2,2` (-15~-14). Sein `df+2` (-6) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Don't throw predictable strings into his parry; mix lows and throws. Whiff-punish his keepout with [[df2]] and stay patient — punish his unsafe cane pokes.",de:"Keine vorhersehbaren Strings in seinen Parry; Lows und Würfe mischen. Sein Keepout mit [[df2]] whiff-punishen und geduldig bleiben — seine unsicheren Cane-Pokes bestrafen."}},
  {c:"Lidia", tag:{en:"Karate — stances, strong mids & lows",de:"Karate — Stances, starke Mids & Lows"}, hurt:{en:"Launcher `df+2` (i15, +0 — only +0, don't try to launch it). Lows: `d+4`, `d+3`, `d+3,1`, `d+3,1,2`. Heat engagers: `f+1+2,3,1+2`, `b+1`, `FC.df+2`. Plus on block: `df+4~3` (+8), `qcf+1+2,2*` (+8), `HRS.4` (+8).",de:"Launcher `df+2` (i15, +0 — nur +0, nicht launchen). Lows: `d+4`, `d+3`, `d+3,1`, `d+3,1,2`. Heat-Engager: `f+1+2,3,1+2`, `b+1`, `FC.df+2`. Plus auf Block: `df+4~3` (+8), `qcf+1+2,2*` (+8), `HRS.4` (+8)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,2`, `1,2,3`, `1,2,4`. Homing (don't step): `db+3`, `b+4`, `qcf+4`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,2`, `1,2,3`, `1,2,4`. Homing (nicht steppen): `db+3`, `b+4`, `qcf+4`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `f,F+4,3` (-27), `qcf+2,2,1+2` (-17), `f+1+2,3,1+2` (-15), `b+3,4,1+2` (-15). His `df+2` (+0) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `f,F+4,3` (-27), `qcf+2,2,1+2` (-17), `f+1+2,3,1+2` (-15), `b+3,4,1+2` (-15). Sein `df+2` (+0) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Block her stance mixups and punish the unsafe enders with [[uf4]]/[[df2]]. Interrupt her pressure with [[df1]] and block the lows on read.",de:"Ihre Stance-Mixups blocken und die unsicheren Ender mit [[uf4]]/[[df2]] bestrafen. Ihren Druck mit [[df1]] unterbrechen und die Lows auf Read blocken."}},
  {c:"Miary Zo", tag:{en:"Ribbon style — unusual range & mixups",de:"Ribbon-Style — ungewöhnliche Reichweite & Mixups"}, hurt:{en:"Launcher `df+2` (i15~16, -7 — only -7, don't try to launch it). Lows: `db+4`, `d+3`, `df+3+4`, `db+3`. Heat engagers: `3,2`, `ws1,4`, `1+2`. Plus on block: `f,f,F+3` (+6~+9), `MOR.1+2` (+6), `u+1+2` (+4).",de:"Launcher `df+2` (i15~16, -7 — nur -7, nicht launchen). Lows: `db+4`, `d+3`, `df+3+4`, `db+3`. Heat-Engager: `3,2`, `ws1,4`, `1+2`. Plus auf Block: `f,f,F+3` (+6~+9), `MOR.1+2` (+6), `u+1+2` (+4)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,1`, `1,1,2`, `1,2`, `1,2,2`. Homing (don't step): `b+2`, `df+3`, `f,F+3`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,1`, `1,1,2`, `1,2`, `1,2,2`. Homing (nicht steppen): `b+2`, `df+3`, `f,F+3`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `f+1+2,1+2,3+4` (-22), `f+3+4,2` (-20), `df+1,1,1+2` (-17), `d+1+2` (-17), `uf+4` (-15). His `df+2` (-7) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `f+1+2,1+2,3+4` (-22), `f+3+4,2` (-20), `df+1,1,1+2` (-17), `d+1+2` (-17), `uf+4` (-15). Sein `df+2` (-7) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Learn her odd range and don't whiff into it. Block, punish her unsafe moves with [[df2]], and keep it simple with steady mids and pokes until the matchup clicks.",de:"Ihre ungewöhnliche Reichweite lernen und nicht reinwhiffen. Blocken, ihre unsicheren Moves mit [[df2]] bestrafen und simpel mit stetigen Mids/Pokes spielen, bis das Matchup sitzt."}},
  {c:"Nina", tag:{en:"Fast safe pokes, CH pressure & tricky lows",de:"Schnelle safe Pokes, CH-Druck & fiese Lows"}, hurt:{en:"Her launcher `df+2` is only −7 and gives a full combo — you can't launch-punish it. Fast mids `df+1` (i13, −1) and `df+4` (i12) keep her plus. The `d+3` low string and `db+4` mix with her mids; `d+3,4,3` ends +22 on hit. Heat via `qcf+2` / `db+1+2`.",de:"Ihr Launcher `df+2` ist nur −7 und gibt vollen Combo — nicht launchbar. Schnelle Mids `df+1` (i13, −1) und `df+4` (i12) halten sie plus. Low-String `d+3` und `db+4` mixen mit Mids; `d+3,4,3` endet +22 auf Hit. Heat über `qcf+2` / `db+1+2`."}, duck:{en:"Duck `1,2` (high,high). Her homing `1+2` / `db+2` beat steps. Block her lows — `d+3` (−17) is launch-punishable while standing; her plus-low `d+4,1` keeps her turn.",de:"`1,2` ducken (High,High). Ihre Homing `1+2` / `db+2` schlagen Steps. Ihre Lows blocken — `d+3` (−17) ist stehend launchbar; ihr Plus-Low `d+4,1` hält ihren Zug."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `ws2` (−13), `qcf+3` (−20), `uf+4,3` (−19), `df+3,2,3` (−17). Her `df+2` at −7 is safe — don't try. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `ws2` (−13), `qcf+3` (−20), `uf+4,3` (−19), `df+3,2,3` (−17). Ihr `df+2` mit −7 ist safe — lass es. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"She wants to poke and stagger you into her CH launchers — don't duck-mash. Interrupt string gaps with [[df1]], respect `f,F+1+2` (+8), launch her whiffs. Use your range: keep her at [[df1]] / ws2 distance and force her to approach into your [[df2]].",de:"Sie will poken und dich in ihre CH-Launcher staggern — nicht Duck-Mashen. String-Lücken mit [[df1]] unterbrechen, `f,F+1+2` (+8) respektieren, ihre Whiffs launchen. Deine Reichweite nutzen: sie auf [[df1]]/ws2-Distanz halten und zum Reingehen in dein [[df2]] zwingen."}},
  {c:"Panda", tag:{en:"Bear — hunting stance & grabs (Kuma's moves)",de:"Bär — Hunting Stance & Grabs (Kumas Moves)"}, hurt:{en:"Launcher `df+2` (i15~16, -9 — only -9, don't try to launch it). Lows: `d+4`, `db+2`, `db+3`, `d+3`. Heat engagers: `1+2`, `d,df,f+2,1`, `b+1+2`. Plus on block: `FUFT.d+1+2` (+17), `u+3+4` (+14cg), `f,F+1+2` (+8 HBS / +5 ROL).",de:"Launcher `df+2` (i15~16, -9 — nur -9, nicht launchen). Lows: `d+4`, `db+2`, `db+3`, `d+3`. Heat-Engager: `1+2`, `d,df,f+2,1`, `b+1+2`. Plus auf Block: `FUFT.d+1+2` (+17), `u+3+4` (+14cg), `f,F+1+2` (+8 HBS / +5 ROL)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `f+2,1`, `b+2,1`, `b+2,1,1+2`. Homing (don't step): `b+1+2`, `ws3`, `uf+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `f+2,1`, `b+2,1`, `b+2,1,1+2`. Homing (nicht steppen): `b+1+2`, `ws3`, `uf+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `b+3+4` (-28), `b+1+4,f,f` (-20~+55), `f,F+2` (-19), `d,df,f+2,2` (-18), `1,1,1` (-16). His `df+2` (-9) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `b+3+4` (-28), `b+1+4,f,f` (-20~+55), `f,F+2` (-19), `d,df,f+2,2` (-18), `1,1,1` (-16). Sein `df+2` (-9) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Same as Kuma: block, break grabs, punish unsafe stance moves with [[df2]]. Whiff-punish the lunges and don't respect Hunting Stance blindly.",de:"Wie Kuma: blocken, Grabs breaken, unsichere Stance-Moves mit [[df2]] bestrafen. Die Lunges whiff-punishen und Hunting Stance nicht blind respektieren."}},
  {c:"Paul", tag:{en:"Heavy hitter — Deathfist & huge damage",de:"Heavy Hitter — Deathfist & riesiger Schaden"}, hurt:{en:"Launcher `df+2` (i15~16, -8 — only -8, don't try to launch it). Lows: `db+4`, `d+4`, `d+4,2`, `d+4,2,1+2`. Heat engagers: `qcf+2`, `qcb+2`, `f+4`. Plus on block: `d+1,2*` (+9), `b+2,1*` (+8), `SS.1` (+8).",de:"Launcher `df+2` (i15~16, -8 — nur -8, nicht launchen). Lows: `db+4`, `d+4`, `d+4,2`, `d+4,2,1+2`. Heat-Engager: `qcf+2`, `qcb+2`, `f+4`. Plus auf Block: `d+1,2*` (+9), `b+2,1*` (+8), `SS.1` (+8)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,3`, `2,3`, `ws3,2`. Homing (don't step): `qcb+4`, `f+3`, `f+4`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,3`, `2,3`, `ws3,2`. Homing (nicht steppen): `qcb+4`, `f+3`, `f+4`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `d+1,4` (-31c), `1,2,3` (-25), `f,F+2,2` (-19c), `d+1+2` (-18), `d+1,2` (-17). His `df+2` (-8) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `d+1,4` (-31c), `1,2,3` (-25), `f,F+2,2` (-19c), `d+1+2` (-18), `d+1,2` (-17). Sein `df+2` (-8) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Block Deathfist `qcf+2` (minus on block) and punish; respect his damage. Whiff-punish his committal swings with [[df2]], block his lows, and don't trade with his CH.",de:"Deathfist `qcf+2` (minus auf Block) blocken und bestrafen; seinen Schaden respektieren. Committale Swings mit [[df2]] whiff-punishen, seine Lows blocken und nicht mit seinem CH traden."}},
  {c:"Raven", tag:{en:"Ninja — teleports, backturned, tricky",de:"Ninja — Teleports, Backturned, tricky"}, hurt:{en:"Launcher `df+2` (i16~18, -13~-11). Lows: `d+3`, `d+4`, `qcf+2`, `db+4`. Heat engagers: `1+2`, `f,F+2`, `ws3+4`. Plus on block: `b+1` (+7c~+8c), `b+3` (+4~+6), `f,f,F+3` (+4~+6).",de:"Launcher `df+2` (i16~18, -13~-11). Lows: `d+3`, `d+4`, `qcf+2`, `db+4`. Heat-Engager: `1+2`, `f,F+2`, `ws3+4`. Plus auf Block: `b+1` (+7c~+8c), `b+3` (+4~+6), `f,f,F+3` (+4~+6)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,4`, `2,4`, `4,1`. Homing (don't step): `ws3+4`, `f+3`, `SZN.1+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,4`, `2,4`, `4,1`. Homing (nicht steppen): `ws3+4`, `f+3`, `SZN.1+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `3~4,F` (-39~-36), `b+2,2,1+2` (-30~-29), `b+4,B+4~3,3+4` (-25~-21), `uf+3+4,3+4` (-25~-21), `b+2,2,3` (-19~-18). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `3~4,F` (-39~-36), `b+2,2,1+2` (-30~-29), `b+4,B+4~3,3+4` (-25~-21), `uf+3+4,3+4` (-25~-21), `b+2,2,3` (-19~-18). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Stay patient against the teleport/BT gimmicks — many are punishable. Block, punish unsafe moves with [[uf4]]/[[df2]], and don't whiff into his mixups.",de:"Gegen die Teleport-/BT-Gimmicks geduldig bleiben — viele sind bestrafbar. Blocken, unsichere Moves mit [[uf4]]/[[df2]] bestrafen und nicht in seine Mixups whiffen."}},
  {c:"Reina", tag:{en:"Mishima mixups, stances & Heaven's Wrath",de:"Mishima-Mixups, Stances & Heaven's Wrath"}, hurt:{en:"Launchers `df+2` (i15, −12) and `uf+4` (i17, Tornado). Electric-style pressure and stance mix from Sentai (`SEN.3` heat engager) and Wind God Step. Fast low `d+4` (i12) chips your life; `db+4` opens rounds.",de:"Launcher `df+2` (i15, −12) und `uf+4` (i17, Tornado). Electric-Druck und Stance-Mix aus Sentai (`SEN.3` Heat-Engager) und Wind God Step. Schneller Low `d+4` (i12) knabbert Leben; `db+4` öffnet Runden."}, duck:{en:"`1,2` is high,high — duck it. Her homing `3`, `b+2`, `f,f,F+4` beat sidesteps, so don't step blindly; step and whiff-punish her linear WGS mids instead. Block the Wind God Step low `WGS.DF+4` on reaction.",de:"`1,2` ist High,High — ducken. Ihre Homing `3`, `b+2`, `f,f,F+4` schlagen Sidesteps, also nicht blind steppen; lieber steppen und ihre linearen WGS-Mids whiff-punishen. Den Wind-God-Step-Low `WGS.DF+4` auf Reaktion blocken."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `WGS.DF+4` (−23), `df+1,2` (−14), her stance enders. Her `uf+4` is −13 → launch on block. Punish `df+2` (−12) with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `WGS.DF+4` (−23), `df+1,2` (−14), ihre Stance-Ender. Ihr `uf+4` ist −13 → auf Block launchen. `df+2` (−12) mit [[c32]] bestrafen."}, plan:{en:"Respect her turn after `f+3+4` (+10) and `f,f,F+3` (+6) — don't mash. Poke with [[df1]], use [[pc]] to blow through her Sentai pressure, launch whiffed WGF/hellsweep attempts with [[df2]]. Keep her out with ws2 fishing and boot pressure.",de:"Nach `f+3+4` (+10) und `f,f,F+3` (+6) ist ihr Zug — nicht mashen. Mit [[df1]] poken, mit [[pc]] durch ihren Sentai-Druck brechen, gewhiffte WGF-/Hellsweep-Versuche mit [[df2]] launchen. Mit ws2-Fishing und Boot-Druck auf Distanz halten."}},
  {c:"Shaheen", tag:{en:"Well-rounded — Stealth Step & slide",de:"Well-Rounded — Stealth Step & Slide"}, hurt:{en:"Launcher `df+2` (i15~16, -7 — only -7, don't try to launch it). Lows: `d+3+4`, `d+3`, `d+4`, `d+1`. Heat engagers: `db+2,1`, `b+1`, `uf+1`. Plus on block: `D*,u+2` (+6), `f,f,F+2` (+5), `SNK.1+2` (+4c).",de:"Launcher `df+2` (i15~16, -7 — nur -7, nicht launchen). Lows: `d+3+4`, `d+3`, `d+4`, `d+1`. Heat-Engager: `db+2,1`, `b+1`, `uf+1`. Plus auf Block: `D*,u+2` (+6), `f,f,F+2` (+5), `SNK.1+2` (+4c)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,2`, `1,2,3`, `1,2,4`. Homing (don't step): `f+4`, `df+3`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,2`, `1,2,3`, `1,2,4`. Homing (nicht steppen): `f+4`, `df+3`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `ws2` (-17), `b+4` (-15). His `df+2` (-7) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `ws2` (-17), `b+4` (-15). Sein `df+2` (-7) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"An honest matchup — win with fundamentals. Block the slide low and punish, whiff-punish his pokes with [[df2]], and interrupt Stealth Step pressure with [[df1]].",de:"Ehrliches Matchup — mit Fundamentals gewinnen. Den Slide-Low blocken und bestrafen, seine Pokes mit [[df2]] whiff-punishen und Stealth-Step-Druck mit [[df1]] unterbrechen."}},
  {c:"Steve", tag:{en:"Boxer — weaves, CH launchers, few lows",de:"Boxer — Weaves, CH-Launcher, kaum Lows"}, hurt:{en:"A boxer: mostly highs/mids from weave stances (Flicker, Ducking, Peekaboo, Lion Heart). Strong CH and plus pressure — `LNH.1+2` (+12), `f,f,F+2` (+6). Few lows, so you can stand and block. `df+2` (i16) is his CH launcher.",de:"Boxer: meist Highs/Mids aus Weave-Stances (Flicker, Ducking, Peekaboo, Lion Heart). Starker CH- und Plus-Druck — `LNH.1+2` (+12), `f,f,F+2` (+6). Kaum Lows, du kannst stehen und blocken. `df+2` (i16) ist sein CH-Launcher."}, duck:{en:"Duck `1,2` (high,high) and his high weave enders. Since he has almost no lows, stay standing and block — don't duck-mash into his mids and CH. His homing weaves (`b+1,2`, `PAB.2`) beat steps.",de:"`1,2` (High,High) und seine High-Weave-Ender ducken. Da er kaum Lows hat, stehen bleiben und blocken — nicht in seine Mids und CH duck-mashen. Seine Homing-Weaves (`b+1,2`, `PAB.2`) schlagen Steps."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `df+2` (−11), `1+2` (−12), `qcf+1` (−10). Most weave pressure is safe/plus — wait for the unsafe ender. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `df+2` (−11), `1+2` (−12), `qcf+1` (−10). Der meiste Weave-Druck ist safe/plus — auf den unsicheren Ender warten. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Standing block is your friend — Steve can't open you low much, so hold guard and punish his gaps. Interrupt weave transitions with [[df1]], launch his −11+ enders with [[df2]]. Don't get baited into CH; keep your turns short.",de:"Stehend blocken ist dein Freund — Steve kann dich kaum tief öffnen, also Guard halten und seine Lücken bestrafen. Weave-Transitions mit [[df1]] unterbrechen, seine −11+-Ender mit [[df2]] launchen. Nicht in CH gebaitet werden; deine Turns kurz halten."}},
  {c:"Victor", tag:{en:"Sword/gun — teleports & stylish mixups",de:"Sword/Gun — Teleports & stylishe Mixups"}, hurt:{en:"Launcher `df+2` (i15~16, -14). Lows: `d+1`, `d+1,1`, `d+4`, `d+3`. Heat engagers: `f+4,1`, `d+2`, `f+1+2`. Plus on block: `PRF.1+2` (+6), `IAI.d+2` (+4), `f+1+2` (+3).",de:"Launcher `df+2` (i15~16, -14). Lows: `d+1`, `d+1,1`, `d+4`, `d+3`. Heat-Engager: `f+4,1`, `d+2`, `f+1+2`. Plus auf Block: `PRF.1+2` (+6), `IAI.d+2` (+4), `f+1+2` (+3)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,1`, `1,1,2`, `1,2`, `1,2,1`. Homing (don't step): `b+4`, `uf+2`, `IAI.1,1+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,1`, `1,1,2`, `1,2`, `1,2,1`. Homing (nicht steppen): `b+4`, `uf+2`, `IAI.1,1+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `b+1+4` (-21), `u+1+2` (-20), `uf+4` (-19), `df+3+4` (-17), `f,F+2` (-16). Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `b+1+4` (-21), `u+1+2` (-20), `uf+4` (-19), `df+3+4` (-17), `f,F+2` (-16). −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Block his Perception/teleport mixups and punish the unsafe ones with [[df2]]. Stay grounded, don't whiff, and interrupt his pressure with [[df1]].",de:"Seine Perception-/Teleport-Mixups blocken und die unsicheren mit [[df2]] bestrafen. Geerdet bleiben, nicht whiffen und seinen Druck mit [[df1]] unterbrechen."}},
  {c:"Xiaoyu", tag:{en:"Extreme evasion — AOP, BT & snake edge",de:"Extreme Evasion — AOP, BT & Snake Edge"}, hurt:{en:"The evasion nightmare: Art of Phoenix (AOP) ducks under highs, plus Backturned (BT) and Hypnotist (HYP) mixups and rolls. Snake edge `df+3` (i29, low, Tornado) launches. Plus low `db+3` (+2 on block!) and `d+3,4`. CH launcher `ws2`. Heat via `b+4,1` / `AOP.2,1`.",de:"Der Evasion-Albtraum: Art of Phoenix (AOP) duckt unter Highs, dazu Backturned (BT) und Hypnotist (HYP) Mixups und Rolls. Snake Edge `df+3` (i29, Low, Tornado) launcht. Plus-Low `db+3` (+2 auf Block!) und `d+3,4`. CH-Launcher `ws2`. Heat über `b+4,1` / `AOP.2,1`."}, duck:{en:"Use MIDS, not highs — AOP ducks your highs and punishes. Block the snake edge `df+3` on reaction → launch. Her `db+3` low is +2 on block (her turn) — don't mash after. Stepping is unreliable vs her evasion; stay grounded and centered.",de:"MIDS nutzen, keine Highs — AOP duckt deine Highs und bestraft. Snake Edge `df+3` auf Reaktion blocken → Launch. Ihr `db+3`-Low ist +2 auf Block (ihr Zug) — danach nicht mashen. Steppen ist gegen ihre Evasion unzuverlässig; geerdet und zentriert bleiben."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `df+3` snake edge (−23!), `b+4,1` (−14), `AOP.2,1` (−12), `HYP.3` (−13). Her `df+2` (−6) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `df+3` Snake Edge (−23!), `b+4,1` (−14), `AOP.2,1` (−12), `HYP.3` (−13). Ihr `df+2` (−6) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Patience and mids beat Xiaoyu — don't whiff (she punishes hard from evasion), use attacks that hit grounded/ducking opponents. Block the snake edge, punish her many unsafe stance moves with [[df2]], and stay calm when she vanishes into AOP/BT — hold guard and hit a mid.",de:"Geduld und Mids schlagen Xiaoyu — nicht whiffen (sie bestraft hart aus der Evasion), Angriffe nutzen die geduckte Gegner treffen. Snake Edge blocken, ihre vielen unsicheren Stance-Moves mit [[df2]] bestrafen und ruhig bleiben, wenn sie in AOP/BT verschwindet — Guard halten und einen Mid setzen."}},
  {c:"Yoshimitsu", tag:{en:"Gimmicks, stance mixups & Flash",de:"Gimmicks, Stance-Mixups & Flash"}, hurt:{en:"Unpredictable: Kincho (KIN), No Sword (NSS) and Dragonfly (DGF) stances plus teleports. `3,1` is +7 on block (heat engager) — very strong. Flash (unblockable) interrupts your offense. `KIN.f+1+2` is +14. Launcher `df+2` (−7).",de:"Unberechenbar: Kincho (KIN), No Sword (NSS) und Dragonfly (DGF) Stances plus Teleports. `3,1` ist +7 auf Block (Heat-Engager) — sehr stark. Flash (unblockbar) unterbricht deine Offense. `KIN.f+1+2` ist +14. Launcher `df+2` (−7)."}, duck:{en:"His `db+3` (−25) and `d+3` (−18) lows are heavily launch-punishable — block on read. Watch Flash: don't mash into it. Homing `f+3` / `uf+4` beat steps. When he enters a stance, block and check for the gap rather than stepping.",de:"Seine Lows `db+3` (−25) und `d+3` (−18) sind stark launchbar — auf Read blocken. Flash beachten: nicht reinmashen. Homing `f+3` / `uf+4` schlagen Steps. Wenn er in eine Stance geht, blocken und die Lücke checken statt zu steppen."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `db+3` (−25!), `f+1+2` (−12), his whiffed sword spins. His `3,1` is +7 — do NOT try to punish it. Punish −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `db+3` (−25!), `f+1+2` (−12), seine gewhiffften Sword-Spins. Sein `3,1` ist +7 — NICHT bestrafen. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Don't over-respect the gimmicks — many are steppable or launch-punishable on block. Interrupt his slow stance entries with [[df1]], punish his unsafe lows hard with [[df2]], and stay calm against Flash (block, don't mash). Keep it simple: solid pokes beat his chaos.",de:"Die Gimmicks nicht zu sehr respektieren — viele sind steppbar oder auf Block launchbar. Seine langsamen Stance-Einstiege mit [[df1]] unterbrechen, seine unsicheren Lows hart mit [[df2]] bestrafen, gegen Flash ruhig bleiben (blocken, nicht mashen). Simpel halten: solide Pokes schlagen sein Chaos."}},
  {c:"Zafina", tag:{en:"Contortionist stances (SCR/MNT/TRT), tricky",de:"Kontortionisten-Stances (SCR/MNT/TRT), tricky"}, hurt:{en:"Launcher `df+2` (i16~17, -12 — only -12, don't try to launch it). Lows: `d+4`, `d+4,3`, `db+3`, `db+4`. Heat engagers: `df+4,1`, `f+1+2`, `SCR.2,1`. Plus on block: `MNT.df+1` (+10), `f,f,F+3` (+7), `f,f,F+1+2` (+6).",de:"Launcher `df+2` (i16~17, -12 — nur -12, nicht launchen). Lows: `d+4`, `d+4,3`, `db+3`, `db+4`. Heat-Engager: `df+4,1`, `f+1+2`, `SCR.2,1`. Plus auf Block: `MNT.df+1` (+10), `f,f,F+3` (+7), `f,f,F+1+2` (+6)."}, duck:{en:"Duckable high strings — block the rest, duck the high: `1,2`, `1,2,3`, `1,3`, `df+1,4`. Homing (don't step): `f,F+2`, `f,F+4`, `f,f,F+1+2`.",de:"Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,3`, `1,3`, `df+1,4`. Homing (nicht steppen): `f,F+2`, `f,F+4`, `f,f,F+1+2`."}, punish:{en:"Launch-punishable → [[uf4]]/[[df2]]: `d+2,4` (-22), `f+2` (-18), `f+2,3,4` (-18), `2,1,3` (-17), `ub+3` (-17). His `df+2` (-12) is safe. Cover −10 with jabs, −13 with [[c32]].",de:"Auf Block launchbar → [[uf4]]/[[df2]]: `d+2,4` (-22), `f+2` (-18), `f+2,3,4` (-18), `2,1,3` (-17), `ub+3` (-17). Sein `df+2` (-12) ist safe. −10 mit Jabs, −13 mit [[c32]]."}, plan:{en:"Block her stance lows and punish her unsafe mids with [[uf4]]/[[df2]]. Don't respect the stances blindly — many transitions are steppable or launchable. Stay calm and hit mids.",de:"Ihre Stance-Lows blocken und ihre unsicheren Mids mit [[uf4]]/[[df2]] bestrafen. Die Stances nicht blind respektieren — viele Transitions sind steppbar oder launchbar. Ruhig bleiben und Mids setzen."}},
  {c:"Alisa", tag:{en:"Mirror — chainsaw pressure, boots & DES mixups",de:"Mirror — Chainsaw-Druck, Boots & DES-Mixups"}, hurt:{en:"Everything you do yourself: launcher `df+2` (i16, −9, safe), `ws2` (Tornado), hopkick `uf+4` (i15). `f,f,F+2` is +5 to +7 on block (her turn). Destructive Form (DES/chainsaw) and Dual Boot (DBT) drive her pressure and heat (`DES.f+2,1,2`). Homing `4` catches steps.",de:"Alles, was du selbst machst: Launcher `df+2` (i16, −9, safe), `ws2` (Tornado), Hopkick `uf+4` (i15). `f,f,F+2` ist +5 bis +7 auf Block (ihr Zug). Destructive Form (DES/Chainsaw) und Dual Boot (DBT) treiben Druck und Heat (`DES.f+2,1,2`). Homing `4` fängt Steps."}, duck:{en:"Read her strings: `1,2,d+2` is high,high,LOW — duck the highs, or block the low, and you can hopkick [[uf4]] the gap. `3,2` and `f+2,3` — only the 2nd hit is high, so hard-duck it on read (don't duck the first mid). `2,3,4` ends in a low. `f+3` / `f+3,2` are high — duckable. Homing `4` beats blind steps.",de:"Ihre Strings lesen: `1,2,d+2` ist High,High,LOW — die Highs ducken oder den Low blocken, und die Lücke mit [[uf4]] hopkicken. Bei `3,2` und `f+2,3` ist nur der 2. Hit High — den auf Read hard-ducken (nicht den ersten Mid). `2,3,4` endet Low. `f+3` / `f+3,2` sind High — duckbar. Homing `4` schlägt blinde Steps."}, punish:{en:"Standing → [[uf4]]/[[df2]]: `uf+4` (−15), `ws2` (−13 → [[c32]]), her unsafe DES/boot enders. Her lows are while-standing launch bait: `db+3` (−13), `d+4` (−12), `db+4` (−14) — block low, then launch with ws2. `df+2` (−9) is safe.",de:"Stehend → [[uf4]]/[[df2]]: `uf+4` (−15), `ws2` (−13 → [[c32]]), ihre unsicheren DES/Boot-Ender. Ihre Lows sind While-Standing-Launch-Bait: `db+3` (−13), `d+4` (−12), `db+4` (−14) — Low blocken, dann mit ws2 launchen. `df+2` (−9) ist safe."}, plan:{en:"It's a neutral and whiff-punish race — whoever controls space with [[df1]] and lands the clean [[df2]] launch wins. Don't respect `f,f,F+2` or DES pressure blindly; find the gaps with [[df1]] / [[pc]] and duck the string highs above. Play your own gameplan better than she does.",de:"Es ist ein Neutral- und Whiff-Punish-Rennen — wer mit [[df1]] den Raum kontrolliert und den sauberen [[df2]]-Launch landet, gewinnt. `f,f,F+2` und DES-Druck nicht blind respektieren; die Lücken mit [[df1]] / [[pc]] finden und die String-Highs oben ducken. Deinen eigenen Gameplan besser spielen als sie."}}

function frameClass(v){
  if(v==null) return "neutral";
  var s=String(v);
  if(/launch|throw/i.test(s)) return "good";
  if(s.charAt(0)==="+") return "good";
  if(s.charAt(0)==="-") return "bad";
  return "neutral";
}

var MLQ="";
function normLoose(s){ return String(s).toLowerCase().replace(/[\s,.\u00b7]/g,''); }
function moveMatches(m,q){
  var raw=q.toLowerCase().trim();
  var hasPlus=raw.indexOf('+')>=0;
  var nq=normLoose(q);
  var cmd=normLoose(m.n);
  if(hasPlus){
    if(nq && cmd.indexOf(nq)>=0) return true;
  } else {
    var nqp=nq.replace(/\+/g,''), cmdp=cmd.replace(/\+/g,'');
    if(nqp && cmdp.indexOf(nqp)>=0) return true;
  }
  if(raw.length>=2){
    var hay=(L(m.lev)+' '+(m.p||[]).join(' ')+' '+(m.x?L(m.x):'')+' '+(m.note?L(m.note).join(' '):'')).toLowerCase();
    if(hay.indexOf(raw)>=0) return true;
  }
  return false;
}
function movelistBody(){
  var h='';
  var sort=state.sort||"cat";
  if(sort==="essentials"){
    CATS.forEach(function(c){
      var ids=Object.keys(MOVES).filter(function(id){return MOVES[id].cat===c.id && MOVES[id].key;});
      if(!ids.length) return;
      h += '<div class="catlabel">'+L(c.name)+'</div><div class="movegrid">'+ids.map(function(id){return moveCard(id);}).join('')+'</div>';
    });
    return h;
  }
  if(sort==="cat"){
    CATS.forEach(function(c){
      var ids=Object.keys(MOVES).filter(function(id){return MOVES[id].cat===c.id;});
      if(!ids.length) return;
      h += '<div class="catlabel">'+L(c.name)+'</div>';
      var normal=ids.filter(function(id){return !MOVES[id].chain;});
      var chains={};
      ids.filter(function(id){return MOVES[id].chain;}).forEach(function(id){ var k=MOVES[id].chain; (chains[k]=chains[k]||[]).push(id); });
      if(normal.length) h += '<div class="movegrid">'+normal.map(function(id){return moveCard(id);}).join('')+'</div>';
      Object.keys(chains).forEach(function(ck){
        var lbl=CHAINLBL[ck]||{en:ck,de:ck};
        h += '<details class="chain"><summary class="chain-sum">'+esc(L(lbl))+' <span class="chain-n">'+chains[ck].length+' Hits</span></summary><div class="movegrid">'+chains[ck].map(function(id){return moveCard(id);}).join('')+'</div></details>';
      });
    });
    return h;
  }
  if(sort==="counterhit"){
    var cids=Object.keys(MOVES).filter(function(id){return MOVES[id].ch;});
    cids.sort(function(a,b){ var d=hitNum({h:MOVES[b].ch})-hitNum({h:MOVES[a].ch}); return d!==0?d:(MOVES[a].n<MOVES[b].n?-1:1); });
    return renderGrouped(cids, grpCH, true);
  }
  var ids=Object.keys(MOVES);
  var keyfn = sort==="startup"?grpStartup : sort==="block"?grpBlock : sort==="range"?grpRange : grpHit;
  ids.sort(function(a,b){ var ga=keyfn(MOVES[a]).k, gb=keyfn(MOVES[b]).k; if(ga!==gb) return ga-gb; return MOVES[a].n<MOVES[b].n?-1:1; });
  return renderGrouped(ids, keyfn, false);
}

function muSlug(c){ return String(c).toLowerCase().replace(/\s+/g,"-"); }
function muDerive(c){
  var fd=FD[c]||{};
  function num(s){var m=String(s||"").match(/-?\d+/);return m?parseInt(m[0]):null;}
  function fsn(s){var m=String(s||"").match(/(\d+)/);return m?parseInt(m[0]):99;}
  var rows=Object.keys(fd).map(function(k){var a=fd[k];return {cmd:k,lv:(a[0]||"").trim(),s:a[1],b:a[3],tg:a[6]||[]};});
  var clean=rows.filter(function(x){return x.lv && !/[t!]/.test(x.lv) && x.cmd.indexOf(".")<0 && x.cmd.indexOf("~")<0 && x.cmd.indexOf("*")<0;});
  var duck=[];
  clean.forEach(function(x){ if(x.cmd.indexOf(",")<0) return; var lv=x.lv.split(",").map(function(s){return s.trim();}); if(lv.length<2) return; var pos=[],hasMid=false; for(var i=0;i<lv.length;i++){ if(lv[i]==="m"||lv[i]==="M") hasMid=true; if(lv[i]==="h" && i>0) pos.push(i+1); } if(pos.length) duck.push({cmd:x.cmd,pos:pos,hasMid:hasMid,s:x.s}); });
  duck.sort(function(a,b){ if(a.hasMid!==b.hasMid) return a.hasMid?-1:1; return fsn(a.s)-fsn(b.s); }); duck=duck.slice(0,6);
  var homing=clean.filter(function(x){return x.tg.indexOf("Homing")>=0;}).sort(function(a,b){return fsn(a.s)-fsn(b.s);}).slice(0,6).map(function(x){return x.cmd;});
  var launch=clean.filter(function(x){var n=num(x.b);var commas=(x.cmd.match(/,/g)||[]).length;return n!==null&&n<=-15&&n>=-30&&!/^[lL]/.test(x.lv)&&commas<=2&&x.cmd.length<=12;}).sort(function(a,b){return num(a.b)-num(b.b);}).slice(0,6);
  return {duck:duck,homing:homing,launch:launch,df2:fd["df+2"]};
}
function mkDuck(d){
  if(!d.duck.length) return L({en:"No mid-into-high strings \u2014 their highs are standalone, duck on read, then while-standing launch with [[ws2]].",de:"Keine Mid-in-High-Strings \u2014 ihre Highs stehen allein, auf Read ducken, dann mit [[ws2]] while-standing launchen."});
  var head=L({en:"Block the earlier hits, duck the marked high: ",de:"Die fr\u00fcheren Hits blocken, den markierten High ducken: "});
  var pay=L({en:" \u2192 then while-standing launch with [[ws2]] (i17) if you have the frames, else a faster ws move.",de:" \u2192 dann mit [[ws2]] (i17) while-standing launchen, wenn die Frames reichen \u2014 sonst ein schnellerer ws-Move."});
  return head+d.duck.map(function(x){ return "`"+x.cmd+"` ("+L({en:"hit ",de:"Hit "})+x.pos.join(",")+")"; }).join(", ")+"."+pay;
}
function mkStep(d){
  var lin=L({en:" Everything non-homing is linear \u2014 sidestep their commits and whiffs, then whiff-punish with [[df2]].",de:" Alles Nicht-Homing ist linear \u2014 ihre Commits und Whiffs sidesteppen, dann mit [[df2]] whiff-punishen."});
  if(!d.homing.length) return L({en:"No homing moves here \u2014 sidestep their linear commits and whiff-punish with [[df2]].",de:"Keine Homing-Moves \u2014 ihre linearen Commits sidesteppen und mit [[df2]] whiff-punishen."});
  return L({en:"Homing (tracks steps \u2014 don't step): ",de:"Homing (trackt Steps \u2014 nicht steppen): "})+d.homing.map(function(c){return "`"+c+"`";}).join(", ")+"."+lin;
}
function mkLaunch(d){
  var safe="";
  if(d.df2){ var mm=(""+d.df2[3]).match(/-?\d+/); if(mm && parseInt(mm[0])>-13) safe=L({en:" Their `df+2` ("+d.df2[3]+") is safe \u2014 don't chase it.",de:" Ihr `df+2` ("+d.df2[3]+") ist safe \u2014 nicht hinterherjagen."}); }
  if(!d.launch.length) return L({en:"Little is launch-punishable \u2014 punish \u221210 to \u221213 with jabs and [[c32]].",de:"Wenig Launchbares \u2014 \u221210 bis \u221213 mit Jabs und [[c32]] bestrafen."})+safe;
  return L({en:"On block \u2192 [[uf4]] at \u221215, [[df2]] from \u221216: ",de:"Auf Block \u2192 [[uf4]] bei \u221215, [[df2]] ab \u221216: "})+d.launch.map(function(x){return "`"+x.cmd+"` ("+x.b+")";}).join(", ")+"."+safe;
}
