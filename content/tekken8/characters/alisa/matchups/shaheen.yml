    de: 'Stealth-Step-Druck (SNK) — mit [[df1]] unterbrechen.'
  - en: 'His slide low — block it on a read and punish.'
    de: 'Sein Slide-Low — auf Read blocken und bestrafen.'
  - en: 'Plus frames `D*,u+2` (+6) / `f,f,F+2` (+5) / `SNK.1+2` (+4) — his turn.'
    de: 'Plus-Frames `D*,u+2` (+6) / `f,f,F+2` (+5) / `SNK.1+2` (+4) — sein Zug.'
