character: 'Shaheen'
deep: true
tag:
  en: 'Well-rounded — Stealth Step & slide'
  de: 'Well-Rounded — Stealth Step & Slide'
hurt:
  en: 'Launcher `df+2` (i15~16, -7 — only -7, don''t try to launch it). Lows: `d+3+4`, `d+3`, `d+4`, `d+1`. Heat engagers: `db+2,1`, `b+1`, `uf+1`. Plus on block: `D*,u+2` (+6), `f,f,F+2` (+5), `SNK.1+2` (+4c).'
  de: 'Launcher `df+2` (i15~16, -7 — nur -7, nicht launchen). Lows: `d+3+4`, `d+3`, `d+4`, `d+1`. Heat-Engager: `db+2,1`, `b+1`, `uf+1`. Plus auf Block: `D*,u+2` (+6), `f,f,F+2` (+5), `SNK.1+2` (+4c).'
duck:
  en: 'Duckable high strings — block the rest, duck the high: `1,2`, `1,2,2`, `1,2,3`, `1,2,4`. Homing (don''t step): `f+4`, `df+3`.'
  de: 'Duckbare High-Strings — Rest blocken, das High ducken: `1,2`, `1,2,2`, `1,2,3`, `1,2,4`. Homing (nicht steppen): `f+4`, `df+3`.'
punish:
  en: 'Launch-punishable → [[uf44]]/[[df2]]: `ws2` (-17), `b+4` (-15). His `df+2` (-7) is safe. Cover −10 with jabs, −13 with [[c32]].'
  de: 'Auf Block launchbar → [[uf44]]/[[df2]]: `ws2` (-17), `b+4` (-15). Sein `df+2` (-7) ist safe. −10 mit Jabs, −13 mit [[c32]].'
plan:
  en: 'An honest matchup — win with fundamentals. Block the slide low and punish, whiff-punish his pokes with [[df2]], and interrupt Stealth Step pressure with [[df1]].'
  de: 'Ehrliches Matchup — mit Fundamentals gewinnen. Den Slide-Low blocken und bestrafen, seine Pokes mit [[df2]] whiff-punishen und Stealth-Step-Druck mit [[df1]] unterbrechen.'
lastReviewed: '2026-07-09'
opponentGameplan:
  en: 'A well-rounded character with Stealth Step (SNK) and a slide — an honest matchup won with fundamentals. Launcher `df+2` is only −7 (safe); lows `d+3+4` / `d+3` / `d+4` / `d+1`; heat engagers `db+2,1` / `b+1` / `uf+1`; plus frames `D*,u+2` (+6), `f,f,F+2` (+5).'
  de: 'Ein Well-Rounded-Charakter mit Stealth Step (SNK) und einem Slide — ein ehrliches Matchup, das man mit Fundamentals gewinnt. Launcher `df+2` ist nur −7 (safe); Lows `d+3+4` / `d+3` / `d+4` / `d+1`; Heat-Engager `db+2,1` / `b+1` / `uf+1`; Plus-Frames `D*,u+2` (+6), `f,f,F+2` (+5).'
keyThreats:
