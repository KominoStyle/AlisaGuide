    de: 'Seine duckbaren Highs (`1,2` / `1,2,2` / `1,2,3`) aufnehmen → den High ducken und mit [[ws2]] launchen.'
  - en: 'Record `ws2` (−17) → block and launch with [[uf44]].'
    de: '`ws2` (−17) aufnehmen → blocken und mit [[uf44]] launchen.'
