    onBlock: '−17'
    with: 'uf+4,4'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
  - notation: 'b+4'
    onBlock: '−15'
    with: 'df+2'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
alisaAnswers:
  - en: 'An honest matchup — win with fundamentals.'
    de: 'Ein ehrliches Matchup — mit Fundamentals gewinnen.'
  - en: 'Block the slide low and punish; whiff-punish his pokes with [[df2]].'
    de: 'Den Slide-Low blocken und bestrafen; seine Pokes mit [[df2]] whiff-punishen.'
  - en: 'Interrupt Stealth Step pressure with [[df1]].'
    de: 'Stealth-Step-Druck mit [[df1]] unterbrechen.'
