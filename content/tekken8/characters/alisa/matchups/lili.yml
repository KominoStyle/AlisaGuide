character: 'Lili'
deep: true
tag:
  en: 'Movement war вҖ” she is fairly linear, so disciplined defense beats her.'
  de: 'Movement-Krieg вҖ” sie ist recht linear, disziplinierte Defense schlГӨgt sie.'
hurt:
  en: 'Her `ws3` (whiff-punish / CH launcher, Tornado), the `db4` snake edge (i30 low), and her Dew Glide (qcf) low-vs-mid mix вҖ” most dangerous in Heat with powered-up Feisty Rabbit. Her backturned (BT) game and Dew Glide chip apply constant pressure.'
  de: 'Ihr `ws3` (Whiff-Punish / CH-Launcher, Tornado), der `db4`-Snake-Edge (i30-Low) und ihr Dew-Glide-(qcf)-Low-vs-Mid-Mix вҖ” am gefГӨhrlichsten in Heat mit aufgeladenem Feisty Rabbit. Ihr Backturned-(BT)-Game und Dew-Glide-Chip machen konstanten Druck.'
duck:
  en: '**Sidestep LEFT (SSL) by default** вҖ” it steps `df1`, `3`, `uf3` and most of her mids. **SSR only for `df4`, `1+2`, `d1`.** **Duck her high enders:** `ws1,2` (duck the 2), `2,4`, `3,2,3`. Her snake edge and Dew Glide low are slow / reactable вҖ” block on read, don''t pre-duck.'
  de: '**StandardmГӨГҹig Sidestep LINKS (SSL)** вҖ” steppt `df1`, `3`, `uf3` und die meisten Mids. **SSR nur bei `df4`, `1+2`, `d1`.** **Duck ihre High-Ender:** `ws1,2` (die 2 ducken), `2,4`, `3,2,3`. Snake Edge und Dew-Glide-Low sind langsam / reaktionsbar вҖ” auf Read blocken, nicht vorducken.'
punish:
  en: '[[df2]] launches everything **вҲ’15 or worse**: `ws3` (вҲ’21), `db4` snake edge (вҲ’24), `f3+4,3,4` (вҲ’20), `d3+4` (вҲ’21), `uf3+4,3+4` (вҲ’21), `1,1,3` (вҲ’15), `f2,3` (вҲ’15). Block the snake edge вҶ’ [[df2]] or [[ws2]]. Standing: `DEW.1,2` (вҲ’14) вҶ’ [[f21]]; her вҲ’13 Heat engagers (`3,1`, `DEW.2,1`) вҶ’ [[df1]] / [[c32]].'
  de: '[[df2]] launcht alles **вҲ’15 oder schlechter**: `ws3` (вҲ’21), `db4`-Snake-Edge (вҲ’24), `f3+4,3,4` (вҲ’20), `d3+4` (вҲ’21), `uf3+4,3+4` (вҲ’21), `1,1,3` (вҲ’15), `f2,3` (вҲ’15). Snake Edge blocken вҶ’ [[df2]] oder [[ws2]]. Stehend: `DEW.1,2` (вҲ’14) вҶ’ [[f21]]; ihre вҲ’13-Heat-Engager (`3,1`, `DEW.2,1`) вҶ’ [[df1]] / [[c32]].'
plan:
  en: 'Kill her movement with homing: [[c32]], [[k4]], [[uf2]], [[b3]]. Whiff-punish her stance whiffs with [[df2]] / [[wr2]] / [[ws2]]. Season 3 nerfed her Feisty Rabbit and Heat pressure (timer cost up, Heat recovery removed, Dew Glide вҲ’2 on block, Heat Smash now steppable) вҖ” she has **no true unseeable 50/50** outside Heat, so respect nothing you can react to and step her linear pressure.'
  de: 'TГ¶te ihr Movement mit Homing: [[c32]], [[k4]], [[uf2]], [[b3]]. Whiff-punish ihre Stance-Whiffs mit [[df2]] / [[wr2]] / [[ws2]]. Season 3 hat Feisty Rabbit und Heat-Druck generft (Timer-Kosten hoch, Heat-Recovery weg, Dew Glide вҲ’2 auf Block, Heat Smash jetzt steppbar) вҖ” sie hat **kein echtes unlesbares 50/50** auГҹerhalb von Heat, also respektier nichts Reaktionsbares und step ihren linearen Druck.'
lastReviewed: '2026-07-09'
opponentGameplan:
  en: 'A movement / whiff-punish character who is fairly linear, so disciplined defense beats her. Her `ws3` (CH launcher, Tornado), the `db+4` snake edge (i30 low) and her Dew Glide (qcf) low-vs-mid mix drive her offense, plus a backturned (BT) game вҖ” most dangerous in Heat with powered-up Feisty Rabbit.'
  de: 'Ein Movement- / Whiff-Punish-Charakter, der recht linear ist, also schlГӨgt disziplinierte Defense sie. Ihr `ws3` (CH-Launcher, Tornado), der `db+4`-Snake-Edge (i30-Low) und ihr Dew-Glide-(qcf)-Low-vs-Mid-Mix treiben ihre Offense, dazu ein Backturned-(BT)-Game вҖ” am gefГӨhrlichsten in Heat mit aufgeladenem Feisty Rabbit.'
keyThreats:
  - en: 'Her `ws3` is a whiff-punish / CH launcher (Tornado) вҖ” do not whiff.'
    de: 'Ihr `ws3` ist ein Whiff-Punish- / CH-Launcher (Tornado) вҖ” nicht whiffen.'
  - en: 'The `db+4` snake edge (i30 low) and Dew Glide low-vs-mid mix apply constant pressure.'
    de: 'Der `db+4`-Snake-Edge (i30-Low) und der Dew-Glide-Low-vs-Mid-Mix machen konstanten Druck.'
  - en: 'Most dangerous in Heat with powered-up Feisty Rabbit.'
    de: 'Am gefГӨhrlichsten in Heat mit aufgeladenem Feisty Rabbit.'
duckTargets:
  - string: 'ws1,2'
    hit: 'duck the 2'
    punish: 'ws2'
    note:
      en: 'Her high ender вҖ” duck the 2 on a read, then while-standing launch.'
      de: 'Ihr High-Ender вҖ” die 2 auf Read ducken, dann while-standing launchen.'
    reviewStatus: verified
  - string: '2,4'
    punish: 'ws2'
    note:
      en: 'Duckable high ender вҖ” launch while standing.'
      de: 'Duckbarer High-Ender вҖ” while-standing launchen.'
    reviewStatus: verified
  - string: '3,2,3'
    punish: 'ws2'
    note:
      en: 'Ends in a high вҖ” duck on a read.'
      de: 'Endet in einem High вҖ” auf Read ducken.'
    reviewStatus: verified
