    onBlock: 'вҲ’24'
    with: 'uf+4,4'
    note:
      en: 'Block the snake edge on reaction вҶ’ huge launch punish.'
      de: 'Die Snake Edge auf Reaktion blocken вҶ’ riesiger Launch-Punish.'
    reviewStatus: verified
  - notation: 'ws3'
    onBlock: 'вҲ’21'
    with: 'df+2'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
  - notation: 'f+3+4,3,4'
    onBlock: 'вҲ’20'
    with: 'df+2'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
stepDirection:
  direction: 'Sidestep LEFT (SSL) by default'
  note:
    en: 'SSL steps `df1`, `3`, `uf3` and most of her mids; use SSR only for `df4`, `1+2`, `d1`.'
    de: 'SSL steppt `df1`, `3`, `uf3` und die meisten Mids; SSR nur bei `df4`, `1+2`, `d1`.'
  reviewStatus: verified
alisaAnswers:
  - en: 'Kill her movement with homing: [[c32]], [[k4]], [[uf2]], [[b3]].'
    de: 'Ihr Movement mit Homing tГ¶ten: [[c32]], [[k4]], [[uf2]], [[b3]].'
  - en: 'Whiff-punish her stance whiffs with [[df2]] / [[wr2]] / [[ws2]].'
    de: 'Ihre Stance-Whiffs mit [[df2]] / [[wr2]] / [[ws2]] whiff-punishen.'
  - en: 'She has no true unseeable 50/50 outside Heat вҖ” respect nothing you can react to and step her linear pressure.'
    de: 'Sie hat kein echtes unlesbares 50/50 auГҹerhalb von Heat вҖ” nichts Reaktionsbares respektieren und ihren linearen Druck steppen.'
knowledgeChecks:
  - en: 'Her snake edge and Dew Glide low are slow / reactable вҖ” block on read, do not pre-duck, then launch.'
    de: 'Snake Edge und Dew-Glide-Low sind langsam / reaktionsbar вҖ” auf Read blocken, nicht vorducken, dann launchen.'
  - en: 'Season 3 nerfed Feisty Rabbit / Heat pressure (Dew Glide вҲ’2 on block, Heat Smash now steppable) вҖ” she is more honest now.'
    de: 'Season 3 hat Feisty Rabbit / Heat-Druck generft (Dew Glide вҲ’2 auf Block, Heat Smash jetzt steppbar) вҖ” sie ist jetzt ehrlicher.'
drills:
  - en: 'Record her high enders (`ws1,2` / `2,4` / `3,2,3`) вҶ’ duck the last high and launch with [[ws2]].'
    de: 'Ihre High-Ender (`ws1,2` / `2,4` / `3,2,3`) aufnehmen вҶ’ den letzten High ducken und mit [[ws2]] launchen.'
  - en: 'Record the `db+4` snake edge вҶ’ block on reaction and launch with [[df2]].'
    de: 'Den `db+4`-Snake-Edge aufnehmen вҶ’ auf Reaktion blocken und mit [[df2]] launchen.'
