character: 'Leroy'
deep: true
tag:
  en: 'Kung fu — cane, parries & keepout'
  de: 'Kung Fu — Stock, Parries & Keepout'
hurt:
  en: 'Launcher `df+2` (i15~16, -6 — only -6, don''t try to launch it). Lows: `d+4`, `d+4,4`, `d+2`, `d+2,4`. Heat engagers: `1+2,1+2,1`, `f+4,4`, `d+1+2`. Plus on block: `b+3` (+9~+10), `SS.1+2` (+7), `f,f,F+3` (+6~+9).'
  de: 'Launcher `df+2` (i15~16, -6 — nur -6, nicht launchen). Lows: `d+4`, `d+4,4`, `d+2`, `d+2,4`. Heat-Engager: `1+2,1+2,1`, `f+4,4`, `d+1+2`. Plus auf Block: `b+3` (+9~+10), `SS.1+2` (+7), `f,f,F+3` (+6~+9).'
duck:
  en: 'Duckable high strings — block the rest, duck the high: `1,1,1+2`, `1,1,1+2,1`, `1,2`, `1,2,1`. Homing (don''t step): `b+4`, `b+3`, `HRM.b+4`.'
  de: 'Duckbare High-Strings — Rest blocken, das High ducken: `1,1,1+2`, `1,1,1+2,1`, `1,2`, `1,2,1`. Homing (nicht steppen): `b+4`, `b+3`, `HRM.b+4`.'
punish:
  en: 'Launch-punishable → [[uf44]]/[[df2]]: `df+2,1+2` (-18), `1+2,1+2,1` (-17~-16), `1,1,1+2,1` (-16~-15), `f+3,1+2,4` (-16~-15), `f,F+2,2` (-15~-14). His `df+2` (-6) is safe. Cover −10 with jabs, −13 with [[c32]].'
  de: 'Auf Block launchbar → [[uf44]]/[[df2]]: `df+2,1+2` (-18), `1+2,1+2,1` (-17~-16), `1,1,1+2,1` (-16~-15), `f+3,1+2,4` (-16~-15), `f,F+2,2` (-15~-14). Sein `df+2` (-6) ist safe. −10 mit Jabs, −13 mit [[c32]].'
plan:
  en: 'Don''t throw predictable strings into his parry; mix lows and throws. Whiff-punish his keepout with [[df2]] and stay patient — punish his unsafe cane pokes.'
  de: 'Keine vorhersehbaren Strings in seinen Parry; Lows und Würfe mischen. Sein Keepout mit [[df2]] whiff-punishen und geduldig bleiben — seine unsicheren Cane-Pokes bestrafen.'
lastReviewed: '2026-07-09'
opponentGameplan:
  en: 'Kung fu with cane, parries and keepout — he punishes predictable strings with his parry and controls space with cane pokes. Launcher `df+2` is only −6 (safe); lows `d+4` / `d+4,4` / `d+2` / `d+2,4`; heat engagers `1+2,1+2,1` / `f+4,4` / `d+1+2`; plus frames `b+3` (+9~+10), `SS.1+2` (+7).'
  de: 'Kung Fu mit Stock, Parries und Keepout — er bestraft vorhersehbare Strings mit seinem Parry und kontrolliert den Raum mit Cane-Pokes. Launcher `df+2` ist nur −6 (safe); Lows `d+4` / `d+4,4` / `d+2` / `d+2,4`; Heat-Engager `1+2,1+2,1` / `f+4,4` / `d+1+2`; Plus-Frames `b+3` (+9~+10), `SS.1+2` (+7).'
keyThreats:
  - en: 'His parry — do not throw predictable strings into it; mix lows and throws.'
    de: 'Sein Parry — keine vorhersehbaren Strings reinwerfen; Lows und Würfe mischen.'
  - en: 'Cane keepout and pokes — whiff-punish them, do not autopilot.'
    de: 'Cane-Keepout und -Pokes — whiff-punishen, nicht autopiloten.'
  - en: 'Strong plus frames `b+3` (+9~+10) / `SS.1+2` (+7) / `f,f,F+3` (+6~+9) — his turn.'
    de: 'Starke Plus-Frames `b+3` (+9~+10) / `SS.1+2` (+7) / `f,f,F+3` (+6~+9) — sein Zug.'
duckTargets:
  - string: '1,1,1+2'
    punish: 'ws2'
    note:
      en: 'Block the rest, duck the high on a read → while-standing launch.'
      de: 'Den Rest blocken, das High auf Read ducken → while-standing launchen.'
    reviewStatus: verified
  - string: '1,2'
    punish: 'ws2'
    note:
      en: 'Duckable high ender — launch while standing.'
      de: 'Duckbarer High-Ender — while-standing launchen.'
    reviewStatus: verified
  - string: '1,2,1'
    punish: 'ws2'
    note:
      en: 'Ends in a high — duck on a read.'
      de: 'Endet in einem High — auf Read ducken.'
    reviewStatus: verified
punishThese:
  - notation: 'df+2,1+2'
    onBlock: '−18'
    with: 'uf+4,4'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
  - notation: '1+2,1+2,1'
    onBlock: '−17~−16'
    with: 'df+2'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
  - notation: 'f+3,1+2,4'
    onBlock: '−16~−15'
    with: 'df+2'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
alisaAnswers:
  - en: 'Do not throw predictable strings into his parry; mix lows and throws.'
    de: 'Keine vorhersehbaren Strings in seinen Parry; Lows und Würfe mischen.'
  - en: 'Whiff-punish his keepout with [[df2]] and stay patient.'
    de: 'Sein Keepout mit [[df2]] whiff-punishen und geduldig bleiben.'
  - en: 'Punish his unsafe cane pokes.'
    de: 'Seine unsicheren Cane-Pokes bestrafen.'
knowledgeChecks:
