    de: 'Sein Parry aufnehmen und üben, Lows / Würfe zu mischen statt zu autopiloten.'
  - en: 'Record `df+2,1+2` (−18) → block and launch with [[uf44]].'
    de: '`df+2,1+2` (−18) aufnehmen → blocken und mit [[uf44]] launchen.'
