    de: 'Sein `df+2`-Launcher ist geblockt nur −6 — er ist safe, nicht launchen.'
  - en: 'Do not autopilot mid strings into his parry — mix lows and throws.'
    de: 'Keine Mid-Strings in seinen Parry autopiloten — Lows und Würfe mischen.'
drills:
