  de: 'Stehend blocken ist dein Freund ‚Äî Steve kann dich kaum tief √∂ffnen, also Guard halten und seine L√ºcken bestrafen. Weave-Transitions mit [[df1]] unterbrechen, seine ‚àí11+-Ender mit [[df2]] launchen. Nicht in CH gebaitet werden; deine Turns kurz halten.'
