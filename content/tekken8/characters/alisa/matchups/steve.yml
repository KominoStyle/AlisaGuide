  de: 'Auf Block launchbar ‚Üí [[uf44]]/[[df2]]: `df+2` (‚àí11), `1+2` (‚àí12), `qcf+1` (‚àí10). Der meiste Weave-Druck ist safe/plus ‚Äî auf den unsicheren Ender warten. ‚àí10 mit Jabs, ‚àí13 mit [[c32]].'
