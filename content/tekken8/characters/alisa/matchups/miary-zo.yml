character: 'Miary Zo'
deep: false
tag:
  en: 'Ribbon style — unusual range & mixups'
  de: 'Ribbon-Style — ungewöhnliche Reichweite & Mixups'
hurt:
  en: 'Launcher `df+2` (i15~16, -7 — only -7, don''t try to launch it). Lows: `db+4`, `d+3`, `df+3+4`, `db+3`. Heat engagers: `3,2`, `ws1,4`, `1+2`. Plus on block: `f,f,F+3` (+6~+9), `MOR.1+2` (+6), `u+1+2` (+4).'
  de: 'Launcher `df+2` (i15~16, -7 — nur -7, nicht launchen). Lows: `db+4`, `d+3`, `df+3+4`, `db+3`. Heat-Engager: `3,2`, `ws1,4`, `1+2`. Plus auf Block: `f,f,F+3` (+6~+9), `MOR.1+2` (+6), `u+1+2` (+4).'
duck:
  en: 'Duckable high strings — block the rest, duck the high: `1,1`, `1,1,2`, `1,2`, `1,2,2`. Homing (don''t step): `b+2`, `df+3`, `f,F+3`.'
  de: 'Duckbare High-Strings — Rest blocken, das High ducken: `1,1`, `1,1,2`, `1,2`, `1,2,2`. Homing (nicht steppen): `b+2`, `df+3`, `f,F+3`.'
punish:
  en: 'Launch-punishable → [[uf44]]/[[df2]]: `f+1+2,1+2,3+4` (-22), `f+3+4,2` (-20), `df+1,1,1+2` (-17), `d+1+2` (-17), `uf+4` (-15). His `df+2` (-7) is safe. Cover −10 with jabs, −13 with [[c32]].'
  de: 'Auf Block launchbar → [[uf44]]/[[df2]]: `f+1+2,1+2,3+4` (-22), `f+3+4,2` (-20), `df+1,1,1+2` (-17), `d+1+2` (-17), `uf+4` (-15). Sein `df+2` (-7) ist safe. −10 mit Jabs, −13 mit [[c32]].'
plan:
  en: 'Learn her odd range and don''t whiff into it. Block, punish her unsafe moves with [[df2]], and keep it simple with steady mids and pokes until the matchup clicks.'
  de: 'Ihre ungewöhnliche Reichweite lernen und nicht reinwhiffen. Blocken, ihre unsicheren Moves mit [[df2]] bestrafen und simpel mit stetigen Mids/Pokes spielen, bis das Matchup sitzt.'
