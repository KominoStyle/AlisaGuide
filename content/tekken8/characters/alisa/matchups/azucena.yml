alisaAnswers:
  - en: 'Respect the LIB mixup but punish its unsafe options.'
    de: 'Den LIB-Mixup respektieren, aber seine unsicheren Optionen bestrafen.'
  - en: 'Block, hold guard, and launch her whiffs with [[df2]].'
    de: 'Blocken, Guard halten und ihre Whiffs mit [[df2]] launchen.'
