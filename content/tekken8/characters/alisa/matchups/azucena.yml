  de: 'Launcher `df+2` (i15~16, -13). Lows: `d+3`, `d+3,3`, `d+3,3,4`, `d+4`. Heat-Engager: `3,3`, `f+4,4`, `b+3`. Plus auf Block: `d+1` (+4), `uf+3+4` (+4~+6), `ws3` (+4).'
