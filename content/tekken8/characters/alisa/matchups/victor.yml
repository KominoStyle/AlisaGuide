    de: 'Launcher `df+2` (i15~16, −14) und Heat-Engager `f+4,1` / `d+2` / `f+1+2`.'
  - en: 'Plus frames `PRF.1+2` (+6) / `IAI.d+2` (+4) keep his turn.'
    de: 'Plus-Frames `PRF.1+2` (+6) / `IAI.d+2` (+4) halten seinen Zug.'
