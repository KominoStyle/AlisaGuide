character: 'Victor'
deep: true
tag:
  en: 'Sword/gun — teleports & stylish mixups'
  de: 'Sword/Gun — Teleports & stylishe Mixups'
hurt:
  en: 'Launcher `df+2` (i15~16, -14). Lows: `d+1`, `d+1,1`, `d+4`, `d+3`. Heat engagers: `f+4,1`, `d+2`, `f+1+2`. Plus on block: `PRF.1+2` (+6), `IAI.d+2` (+4), `f+1+2` (+3).'
  de: 'Launcher `df+2` (i15~16, -14). Lows: `d+1`, `d+1,1`, `d+4`, `d+3`. Heat-Engager: `f+4,1`, `d+2`, `f+1+2`. Plus auf Block: `PRF.1+2` (+6), `IAI.d+2` (+4), `f+1+2` (+3).'
duck:
  en: 'Duckable high strings — block the rest, duck the high: `1,1`, `1,1,2`, `1,2`, `1,2,1`. Homing (don''t step): `b+4`, `uf+2`, `IAI.1,1+2`.'
  de: 'Duckbare High-Strings — Rest blocken, das High ducken: `1,1`, `1,1,2`, `1,2`, `1,2,1`. Homing (nicht steppen): `b+4`, `uf+2`, `IAI.1,1+2`.'
punish:
  en: 'Launch-punishable → [[uf44]]/[[df2]]: `b+1+4` (-21), `u+1+2` (-20), `uf+4` (-19), `df+3+4` (-17), `f,F+2` (-16). Cover −10 with jabs, −13 with [[c32]].'
  de: 'Auf Block launchbar → [[uf44]]/[[df2]]: `b+1+4` (-21), `u+1+2` (-20), `uf+4` (-19), `df+3+4` (-17), `f,F+2` (-16). −10 mit Jabs, −13 mit [[c32]].'
plan:
  en: 'Block his Perception/teleport mixups and punish the unsafe ones with [[df2]]. Stay grounded, don''t whiff, and interrupt his pressure with [[df1]].'
  de: 'Seine Perception-/Teleport-Mixups blocken und die unsicheren mit [[df2]] bestrafen. Geerdet bleiben, nicht whiffen und seinen Druck mit [[df1]] unterbrechen.'
lastReviewed: '2026-07-09'
opponentGameplan:
  en: 'A weapon character built on Perception / teleport mixups. Launcher `df+2` (i15~16, −14); lows `d+1` / `d+1,1` / `d+4` / `d+3`; heat engagers `f+4,1` / `d+2` / `f+1+2`. Plus frames `PRF.1+2` (+6), `IAI.d+2` (+4), `f+1+2` (+3) keep his turn.'
  de: 'Ein Weapon-Charakter auf Basis von Perception- / Teleport-Mixups. Launcher `df+2` (i15~16, −14); Lows `d+1` / `d+1,1` / `d+4` / `d+3`; Heat-Engager `f+4,1` / `d+2` / `f+1+2`. Plus-Frames `PRF.1+2` (+6), `IAI.d+2` (+4), `f+1+2` (+3) halten seinen Zug.'
