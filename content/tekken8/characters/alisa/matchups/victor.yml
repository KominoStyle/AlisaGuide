alisaAnswers:
  - en: 'Block his Perception / teleport mixups and punish the unsafe ones with [[df2]].'
    de: 'Seine Perception- / Teleport-Mixups blocken und die unsicheren mit [[df2]] bestrafen.'
  - en: 'Stay grounded and do not whiff — he thrives on whiff-punishing.'
    de: 'Geerdet bleiben und nicht whiffen — er lebt vom Whiff-Punishen.'
  - en: 'Interrupt his pressure with [[df1]].'
    de: 'Seinen Druck mit [[df1]] unterbrechen.'
knowledgeChecks:
  - en: 'Respect his plus frames (`PRF.1+2` +6, `IAI.d+2` +4) — block, do not mash after them.'
    de: 'Seine Plus-Frames (`PRF.1+2` +6, `IAI.d+2` +4) respektieren — blocken, danach nicht mashen.'
  - en: 'Do not step his homing `b+4` / `uf+2` / `IAI.1,1+2` — block and whiff-punish instead.'
    de: 'Sein Homing `b+4` / `uf+2` / `IAI.1,1+2` nicht steppen — stattdessen blocken und whiff-punishen.'
drills:
  - en: 'Record his duckable jab strings (`1,1` / `1,1,2` / `1,2`) → duck the high and launch with [[ws2]].'
    de: 'Seine duckbaren Jab-Strings (`1,1` / `1,1,2` / `1,2`) aufnehmen → den High ducken und mit [[ws2]] launchen.'
  - en: 'Record `PRF.1+2` (+6) and practise blocking without mashing after it.'
    de: '`PRF.1+2` (+6) aufnehmen und üben, danach zu blocken statt zu mashen.'
