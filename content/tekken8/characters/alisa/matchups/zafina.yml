  de: 'Auf Block launchbar → [[uf44]]/[[df2]]: `d+2,4` (-22), `f+2` (-18), `f+2,3,4` (-18), `2,1,3` (-17), `ub+3` (-17). Sein `df+2` (-12) ist safe. −10 mit Jabs, −13 mit [[c32]].'
plan:
  en: 'Block her stance lows and punish her unsafe mids with [[uf44]]/[[df2]]. Don''t respect the stances blindly — many transitions are steppable or launchable. Stay calm and hit mids.'
  de: 'Ihre Stance-Lows blocken und ihre unsicheren Mids mit [[uf44]]/[[df2]] bestrafen. Die Stances nicht blind respektieren — viele Transitions sind steppbar oder launchbar. Ruhig bleiben und Mids setzen.'
