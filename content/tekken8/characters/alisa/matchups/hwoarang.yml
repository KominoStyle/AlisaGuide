character: 'Hwoarang'
deep: true
tag:
  en: 'Relentless stance pressure (LFS/RFF/RFS)'
  de: 'Dauerhafter Stance-Druck (LFS/RFF/RFS)'
hurt:
  en: 'Nonstop stance pressure from flamingo (LFS), Right Flamingo (RFF) and switches. Tons of plus frames: `RFF.f+3` (+12), `3,3,4` (+8), plus-low `d+3,4` (+8). Launcher `df+2` (−7, safe). Fast homing mid `df+4`.'
  de: 'Dauerhafter Stance-Druck aus Flamingo (LFS), Right Flamingo (RFF) und Wechseln. Viele Plus-Frames: `RFF.f+3` (+12), `3,3,4` (+8), Plus-Low `d+3,4` (+8). Launcher `df+2` (−7, safe). Schneller Homing-Mid `df+4`.'
duck:
  en: 'Duck `1,2` (high,high). Stepping is risky — his stances track and `df+4` / `d+3+4` are homing; block and find the gaps instead. Block his lows (`db+4`, `LFS.d+3`) — but low enders like `db+4,4` are plus, so don''t mash after.'
  de: '`1,2` ducken (High,High). Steppen ist riskant — seine Stances tracken und `df+4` / `d+3+4` sind Homing; lieber blocken und Lücken finden. Seine Lows blocken (`db+4`, `LFS.d+3`) — aber Low-Ender wie `db+4,4` sind plus, also danach nicht mashen.'
punish:
  en: 'Launch-punishable → [[uf44]]/[[df2]]: `df+3` (−14), `df+3+4` (−14). Most stance strings are safe or plus — don''t force punishes, wait for the unsafe ender. His `uf+4` is a high (−2) — duck-punish it. Cover −10 with jabs.'
  de: 'Auf Block launchbar → [[uf44]]/[[df2]]: `df+3` (−14), `df+3+4` (−14). Die meisten Stance-Strings sind safe oder plus — keine Punishes erzwingen, auf den unsicheren Ender warten. Sein `uf+4` ist ein High (−2) — wegducken und bestrafen. −10 mit Jabs.'
plan:
  en: 'Patience beats Hwoarang: block, hold guard through the plus frames, and take your turn only in real gaps with fast jabs or [[pc]]. Don''t panic-step. When he whiffs a stance transition, launch with [[df2]]. Keep him at range to deny stance entry.'
  de: 'Geduld schlägt Hwoarang: blocken, den Guard durch die Plus-Frames halten und nur in echten Lücken mit schnellen Jabs oder [[pc]] den Zug nehmen. Nicht panisch steppen. Wenn er einen Stance-Transition whifft, mit [[df2]] launchen. Auf Distanz halten, um Stance-Einstieg zu verhindern.'
lastReviewed: '2026-07-09'
opponentGameplan:
  en: 'Relentless stance pressure from Flamingo (LFS), Right Flamingo (RFF) and switches, with tons of plus frames — `RFF.f+3` (+12), `3,3,4` (+8), the plus-low `d+3,4` (+8). His `df+2` launcher is safe (−7) and his `df+4` is a fast homing mid.'
  de: 'Dauerhafter Stance-Druck aus Flamingo (LFS), Right Flamingo (RFF) und Wechseln, mit vielen Plus-Frames — `RFF.f+3` (+12), `3,3,4` (+8), der Plus-Low `d+3,4` (+8). Sein `df+2`-Launcher ist safe (−7) und sein `df+4` ist ein schneller Homing-Mid.'
keyThreats:
  - en: 'Nonstop stance pressure (LFS / RFF / RFS) with heavy plus frames — `RFF.f+3` (+12), `3,3,4` (+8).'
    de: 'Dauerhafter Stance-Druck (LFS / RFF / RFS) mit starken Plus-Frames — `RFF.f+3` (+12), `3,3,4` (+8).'
  - en: 'Plus-low `d+3,4` (+8) and low enders like `db+4,4` (plus) keep his turn.'
    de: 'Plus-Low `d+3,4` (+8) und Low-Ender wie `db+4,4` (plus) halten seinen Zug.'
  - en: 'Fast homing mid `df+4` checks your steps.'
    de: 'Schneller Homing-Mid `df+4` checkt deine Steps.'
duckTargets:
  - string: '1,2'
    punish: 'ws2'
    note:
      en: 'High, high — duck on a read, then while-standing launch.'
      de: 'High, High — auf Read ducken, dann while-standing launchen.'
    reviewStatus: verified
punishThese:
  - notation: 'df+3'
    onBlock: '−14'
    with: 'uf+4,4'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
  - notation: 'df+3+4'
    onBlock: '−14'
    with: 'df+2'
    note:
      en: 'Launch on block.'
      de: 'Auf Block launchen.'
    reviewStatus: verified
alisaAnswers:
  - en: 'Patience: block, hold guard through the plus frames, and take your turn only in real gaps with fast jabs or [[pc]].'
    de: 'Geduld: blocken, den Guard durch die Plus-Frames halten und nur in echten Lücken mit schnellen Jabs oder [[pc]] den Zug nehmen.'
  - en: 'Do not panic-step; when he whiffs a stance transition, launch with [[df2]].'
    de: 'Nicht panisch steppen; wenn er einen Stance-Transition whifft, mit [[df2]] launchen.'
  - en: 'Keep him at range to deny stance entry.'
    de: 'Auf Distanz halten, um Stance-Einstieg zu verhindern.'
knowledgeChecks:
  - en: 'Most stance strings are safe or plus — do not force punishes; wait for the unsafe ender.'
    de: 'Die meisten Stance-Strings sind safe oder plus — keine Punishes erzwingen; auf den unsicheren Ender warten.'
  - en: 'His `uf+4` is a high (−2) — duck-punish it; and do not step (his stances track, `df+4` / `d+3+4` are homing).'
    de: 'Sein `uf+4` ist ein High (−2) — wegducken und bestrafen; und nicht steppen (seine Stances tracken, `df+4` / `d+3+4` sind Homing).'
drills:
  - en: 'Record his RFF / LFS plus pressure and practise holding guard, punishing only the unsafe ender with [[df2]].'
    de: 'Seinen RFF- / LFS-Plus-Druck aufnehmen und üben, den Guard zu halten und nur den unsicheren Ender mit [[df2]] zu bestrafen.'
  - en: 'Record `uf+4` (high) and practise ducking and punishing it.'
    de: '`uf+4` (High) aufnehmen und üben, es wegzuducken und zu bestrafen.'
