character: 'Eddy'
deep: false
tag:
  en: 'Capoeira flow тАФ handstand, tricky lows/highs'
  de: 'Capoeira-Flow тАФ Handstand, fiese Lows/Highs'
hurt:
  en: 'Launcher `df+2` (i14~15, -5 тАФ only -5, don''t try to launch it). Lows: `d+4`, `d+4,3`, `df+4`, `db+2`. Heat engagers: `4,4`, `uf+1,4`, `f+3+4`. Plus on block: `1,2,4~4` (+8~+10), `u+4~4` (+8), `f,f,F+3` (+8).'
  de: 'Launcher `df+2` (i14~15, -5 тАФ nur -5, nicht launchen). Lows: `d+4`, `d+4,3`, `df+4`, `db+2`. Heat-Engager: `4,4`, `uf+1,4`, `f+3+4`. Plus auf Block: `1,2,4~4` (+8~+10), `u+4~4` (+8), `f,f,F+3` (+8).'
duck:
  en: 'Duckable high strings тАФ block the rest, duck the high: `1,2`, `1,2,3`, `1,2,4`, `1,2,4~3`. Homing (don''t step): `f+3`, `qcb+4`, `uf+4`.'
  de: 'Duckbare High-Strings тАФ Rest blocken, das High ducken: `1,2`, `1,2,3`, `1,2,4`, `1,2,4~3`. Homing (nicht steppen): `f+3`, `qcb+4`, `uf+4`.'
punish:
  en: 'Launch-punishable тЖТ [[uf44]]/[[df2]]: `f+4,3+4` (-24c), `b+1,4,3+4` (-24c), `df+3` (-18~-16), `uf+3,3` (-18), `ws2` (-18). His `df+2` (-5) is safe. Cover тИТ10 with jabs, тИТ13 with [[c32]].'
  de: 'Auf Block launchbar тЖТ [[uf44]]/[[df2]]: `f+4,3+4` (-24c), `b+1,4,3+4` (-24c), `df+3` (-18~-16), `uf+3,3` (-18), `ws2` (-18). Sein `df+2` (-5) ist safe. тИТ10 mit Jabs, тИТ13 mit [[c32]].'
plan:
  en: 'Hold guard through his flow тАФ most of it is steppable or minus. Block his lows, punish stance whiffs with [[df2]], interrupt with [[df1]]. Don''t panic-mash into his rhythm.'
  de: 'Den Guard durch seinen Flow halten тАФ das meiste ist steppbar oder minus. Seine Lows blocken, Stance-Whiffs mit [[df2]] bestrafen, mit [[df1]] unterbrechen. Nicht panisch in seinen Rhythmus mashen.'
