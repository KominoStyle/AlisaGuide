- name:
    en: 'Core BnB'
    de: 'Kern-BnB'
  from: 'df+2 / uf+4,4 / b+3+4 / ws2'
  category: 'staple'
  difficulty: 2
  seq:
    - 'df+1,1'
    - 'f+2,1'
    - 'uf+1'
    - 'f+3'
    - 'DBT f+1'
  tIdx: 2
  note:
    en: 'Your main combo from most launchers. uf+1 is the Tornado; after it, f+3 transitions to DBT, then DBT f+1 is the damage ender.'
    de: 'Dein Haupt-Combo aus den meisten Launchern. uf+1 ist der Tornado; danach geht f+3 in DBT über, dann ist DBT f+1 der Schaden-Ender.'
- name:
    en: 'Simple / online'
    de: 'Einfach / Online'
  from: 'any launcher'
  category: 'beginner'
  difficulty: 1
  seq:
    - 'df+1'
    - 'f+2,1'
    - 'uf+1'
    - 'f+3'
  tIdx: 2
  note:
    en: 'Fewer inputs, very consistent — use it online where you drop combos. Lower damage, but it almost never fails.'
    de: 'Weniger Inputs, sehr konstant — nutz es online, wo du Combos dropst. Weniger Schaden, aber fällt fast nie.'
- name:
    en: 'Whiff-punish staple'
    de: 'Whiff-Punish-Staple'
  from: 'df+2 / launchers'
  category: 'staple'
  difficulty: 2
  seq:
    - 'df+2'
    - 'dash'
    - '1,2,2'
    - 'dash'
    - '2,3,3'
    - 'dash'
    - 'f,3,f,1'
  tIdx: 2
  note:
    en: 'Your bread-and-butter off df+2. 1,2,2 is the Tornado (S!). Current-patch reference route — exact filler timing varies by launch height, confirm in the lab.'
    de: 'Dein Brot-und-Butter aus df+2. 1,2,2 ist der Tornado (S!). Aktuelle-Patch-Referenzroute — exaktes Filler-Timing hängt von der Launch-Höhe ab, im Lab bestätigen.'
- name:
    en: 'WS punish (high damage)'
    de: 'WS-Punish (hoher Schaden)'
  from: 'ws1,2,3 (after a blocked low)'
  category: 'staple'
  difficulty: 2
  damage: 92
  seq:
    - 'ws1,2,3'
    - 'uf+1'
    - 'dash'
    - 'f+4,1,4'
  tIdx: 1
  note:
    en: '~92 dmg — one of your highest non-Heat routes. After blocking a low you often stand straight into ws1,2,3. uf+1 is the Tornado.'
    de: '~92 Schaden — eine deiner höchsten Nicht-Heat-Routen. Nach geblocktem Low stehst du oft direkt in ws1,2,3. uf+1 ist der Tornado.'
- name:
    en: 'Instant low launch'
    de: 'Sofort-Low-Launch'
  from: 'd+3+4 (instant Tornado)'
  category: 'staple'
  difficulty: 2
  seq:
    - 'd+3+4'
    - 'dash'
    - 'f+2,1'
    - 'uf+1'
    - 'f+3'
  tIdx: 0
  note:
    en: 'd+3+4 is a homing low that tornados instantly on hit — a surprise launch starter. Dash in, then run the juggle.'
    de: 'd+3+4 ist ein Homing-Low, das bei Treffer sofort tornadot — ein Überraschungs-Launch. Dash rein, dann den Juggle.'
- name:
    en: 'Wall finish'
    de: 'Wand-Finish'
  from: 'after carrying to the wall'
  category: 'wall'
  difficulty: 1
  seq:
    - 'wall splat (f+1+2)'
    - 'dash'
    - 'f+2,1'
  tIdx: -1
  note:
    en: 'At the wall, splat with f+1+2, dash in and add a quick filler. In Heat, the Heat Smash H.2+3 is your highest-damage wall ender. Exact routes depend on launch height and distance — confirm the current version in the lab.'
    de: 'An der Wand mit f+1+2 splatten, reindashen und einen kurzen Filler anhängen. In Heat ist der Heat Smash H.2+3 dein schadensstärkster Wand-Ender. Genaue Routen hängen von Launch-Höhe und Distanz ab — die aktuelle Version im Lab bestätigen.'
- name:
    en: 'Grounded pickup'
    de: 'Boden-Pickup'
  from: 'opponent stays grounded'
  category: 'small'
  difficulty: 1
  seq:
    - 'OTG db+1+2'
  tIdx: -1
  note:
    en: 'Ground-hitting low with a Spike — your damage pickup when they stay down after a knockdown. If they stand up and block it, it is -14.'
    de: 'Boden-treffendes Low mit Spike — dein Schaden-Pickup, wenn er nach dem Knockdown liegen bleibt. Steht er auf und blockt, ist es -14.'
