name: Deploy static site to Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.final-deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages (attempt 1)
        id: first-deploy
        continue-on-error: true
        uses: actions/deploy-pages@v5

      - name: Deploy to GitHub Pages (retry)
        id: retry-deploy
        if: steps.first-deploy.outcome == 'failure'
        uses: actions/deploy-pages@v5

      - name: Finalize deployment result
        id: final-deploy
        if: always()
        run: |
          if [ "${{ steps.first-deploy.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.first-deploy.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.retry-deploy.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.retry-deploy.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "Both deployment attempts failed." >&2
            exit 1
          fi
